<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifiers Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --surface: rgba(20, 20, 25, 0.6);
            --surface-hover: rgba(40, 40, 50, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --border-active: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: #8a8a93;
            --accent: #00f0ff;
            --accent-glow: rgba(0, 240, 255, 0.4);
            --danger: #ff0055;
            
            --cat-player: #ff4757;
            --cat-inventory: #ffa502;
            --cat-rules: #9b59b6;
            --cat-effects: #2ed573;
            --cat-spawn: #ff6348;
            --cat-settings: #1e90ff;
            --cat-other: #eccc68;

            --font-main: 'Montserrat', sans-serif;
            --wheel-size: 550px;
        }

        [data-theme="light"] {
            --bg-color: #f0f2f5;
            --surface: rgba(255, 255, 255, 0.7);
            --surface-hover: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.1);
            --border-active: rgba(0, 0, 0, 0.3);
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --accent: #0055ff;
            --accent-glow: rgba(0, 85, 255, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 71, 87, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 240, 255, 0.05), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        header {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area h1 {
            font-weight: 900;
            font-size: 22px;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--text-main), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls-area {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .icon-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: 0.3s;
        }

        .icon-btn:hover {
            background: var(--surface-hover);
            border-color: var(--border-active);
            transform: translateY(-2px);
        }

        .tabs {
            display: flex;
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 14px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-btn.active {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        main {
            flex: 1;
            padding: 40px 30px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        .section {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .manual-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 40px;
            align-items: start;
        }

        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
        }

        .category-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .category-card:hover {
            border-color: var(--border-active);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .category-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
        }

        .category-title::before {
            content: '';
            display: block;
            width: 14px;
            height: 14px;
            border-radius: 4px;
            background-color: var(--cat-color);
            box-shadow: 0 0 15px var(--cat-color);
            transform: rotate(45deg);
        }

        .modifier-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.15);
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            position: relative;
        }

        [data-theme="light"] .modifier-item {
            background: rgba(255, 255, 255, 0.5);
        }

        .modifier-item:hover {
            background: var(--surface-hover);
            transform: translateX(5px);
        }

        .modifier-item.selected {
            border-color: var(--cat-color);
            background: linear-gradient(90deg, rgba(255,255,255,0.05), transparent);
            box-shadow: inset 4px 0 0 var(--cat-color);
        }

        .modifier-item.disabled {
            opacity: 0.4;
            filter: grayscale(1);
            pointer-events: none;
        }

        .mod-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mod-icon {
            font-size: 22px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .mod-name {
            font-weight: 700;
            font-size: 14px;
        }

        .mod-pct {
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 900;
            color: var(--cat-color);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .mod-desc {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            display: block;
            font-weight: 600;
        }

        .summary-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            position: sticky;
            top: 100px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 120px);
        }

        .summary-title {
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .total-pct {
            font-size: 64px;
            font-weight: 900;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        [data-theme="light"] .total-pct {
            background: linear-gradient(135deg, #000, #555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .selected-list {
            overflow-y: auto;
            padding-right: 10px;
            flex: 1;
        }

        .selected-list::-webkit-scrollbar {
            width: 6px;
        }
        .selected-list::-webkit-scrollbar-thumb {
            background: var(--border-active);
            border-radius: 10px;
        }

        .selected-item {
            font-size: 14px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .roulette-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 50px;
            padding: 20px 0;
        }

        .wheel-wrapper {
            position: relative;
            width: var(--wheel-size);
            height: var(--wheel-size);
            border-radius: 50%;
            background: #000;
            box-shadow: 
                0 0 0 10px rgba(255,255,255,0.05),
                0 0 50px rgba(0,0,0,0.5),
                inset 0 0 30px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        [data-theme="light"] .wheel-wrapper {
            background: #fff;
            box-shadow: 
                0 0 0 10px rgba(0,0,0,0.05),
                0 20px 50px rgba(0,0,0,0.2);
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 0.1s;
        }

        .wheel-center {
            position: absolute;
            width: 80px;
            height: 80px;
            background: var(--bg-color);
            border-radius: 50%;
            z-index: 10;
            border: 4px solid var(--border-active);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wheel-center::after {
            content: '';
            width: 30px;
            height: 30px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .pointer-wrapper {
            position: absolute;
            top: 50%;
            right: -30px;
            transform: translateY(-50%);
            z-index: 20;
            filter: drop-shadow(-5px 0 10px rgba(0,0,0,0.5));
        }

        .pointer {
            width: 60px;
            height: 40px;
            background: var(--text-main);
            clip-path: polygon(100% 50%, 0 0, 15% 50%, 0 100%);
        }

        .spin-controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .spin-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 18px 50px;
            font-size: 20px;
            font-weight: 900;
            border-radius: 100px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 30px var(--accent-glow);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .spin-btn::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
            opacity: 0;
        }

        .spin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px var(--accent-glow);
        }

        .spin-btn:hover::after {
            opacity: 1;
            left: 100%;
        }

        .spin-btn:disabled {
            background: var(--surface-hover);
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.4s;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            transform: scale(0.9) translateY(30px);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .modal-overlay.show .modal {
            transform: scale(1) translateY(0);
        }

        .modal::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 5px;
            background: var(--modal-color, var(--accent));
        }

        .modal-icon {
            font-size: 80px;
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        .modal-name {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .modal-pct {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 25px;
            color: var(--modal-color, var(--accent));
            background: rgba(0,0,0,0.2);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 100px;
        }

        .modal-desc {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .modal-btn {
            background: transparent;
            color: var(--text-main);
            border: 2px solid var(--border-active);
            padding: 15px 40px;
            font-size: 16px;
            border-radius: 100px;
            cursor: pointer;
            font-weight: 800;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-btn:hover {
            background: var(--border-active);
        }

        @media (max-width: 1024px) {
            .manual-layout { grid-template-columns: 1fr; }
            .summary-panel { position: static; max-height: none; }
            :root { --wheel-size: 400px; }
        }

        @media (max-width: 600px) {
            .categories { grid-template-columns: 1fr; }
            :root { --wheel-size: 300px; }
            .spin-btn { padding: 15px 30px; font-size: 16px; }
            .modal { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1 id="app-title">Modifiers</h1>
        </div>
        <div class="tabs" id="nav-tabs">
            <button class="tab-btn active" data-target="manual" id="tab-manual">Manual</button>
            <button class="tab-btn" data-target="roulette" id="tab-roulette">Roulette</button>
        </div>
        <div class="controls-area">
            <button class="icon-btn" id="lang-toggle">🌐</button>
            <button class="icon-btn" id="theme-toggle">🌓</button>
        </div>
    </header>

    <main>
        <section id="manual" class="section active">
            <div class="manual-layout">
                <div class="categories" id="categories-container"></div>
                <aside class="summary-panel">
                    <div class="summary-title" id="summary-title">Total Difficulty</div>
                    <div class="total-pct" id="total-pct">0%</div>
                    <div class="selected-list" id="selected-list"></div>
                </aside>
            </div>
        </section>

        <section id="roulette" class="section">
            <div class="roulette-container">
                <div class="wheel-wrapper">
                    <canvas id="wheel"></canvas>
                    <div class="wheel-center"></div>
                    <div class="pointer-wrapper">
                        <div class="pointer"></div>
                    </div>
                </div>
                <div class="spin-controls">
                    <button class="spin-btn" id="spin-btn">Spin Wheel</button>
                </div>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="result-modal">
        <div class="modal" id="modal-content">
            <div class="modal-icon" id="res-icon"></div>
            <div class="modal-name" id="res-name"></div>
            <div class="modal-pct" id="res-pct"></div>
            <div class="modal-desc" id="res-desc"></div>
            <button class="modal-btn" id="modal-close">Close</button>
        </div>

            { id: 'cat_spawn', key: 'spawn', color: 'var(--cat-spawn)', hex: '#ff6348', items: [
                { id: 's1', icon: '💔', pct: 5, group: 'spawn', ru: { n: 'Митинг', d: 'Частота Появления Монстров 1' }, en: { n: 'Protest', d: 'Monster Spawn Rate 1' } },
                { id: 's2', icon: '💀', pct: 15, group: 'spawn', ru: { n: 'Армагедон', d: 'Частота Появления Монстров 3' }, en: { n: 'Armageddon', d: 'Monster Spawn Rate 3' } },
                { id: 's3', icon: '☠️', pct: 25, group: 'spawn', ru: { n: 'Апокалипсис', d: 'Частота Появления Монстров 5' }, en: { n: 'Apocalypse', d: 'Monster Spawn Rate 5' } }
            ]},
            { id: 'cat_set', key: 'settings', color: 'var(--cat-settings)', hex: '#1e90ff', items: [
                { id: 'st1', icon: '👁️', pct: 5, group: 'fov', ru: { n: 'Не Те Очки', d: 'Поле Зрения: 60' }, en: { n: 'Wrong Glasses', d: 'FOV: 60' } },
                { id: 'st2', icon: '👁️', pct: 10, group: 'fov', ru: { n: 'Соколиный Глаз', d: 'Поле Зрения: 45' }, en: { n: 'Hawk Eye', d: 'FOV: 45' } },
                { id: 'st3', icon: '👁️', pct: 15, group: 'fov', ru: { n: 'Шоколадный Глаз', d: 'Поле Зрения: 30' }, en: { n: 'Chocolate Eye', d: 'FOV: 30' } },
                { id: 'st4', icon: '🧭', pct: 5, group: 'render', ru: { n: 'Гугл GPS', d: 'Прорисовка 6 Чанков' }, en: { n: 'Google GPS', d: 'Render Distance 6' } },
                { id: 'st5', icon: '🧭', pct: 10, group: 'render', ru: { n: 'Карта', d: 'Прорисовка 4 Чанка' }, en: { n: 'Map', d: 'Render Distance 4' } },
                { id: 'st6', icon: '🧭', pct: 15, group: 'render', ru: { n: 'Визитка', d: 'Прорисовка 2 Чанка' }, en: { n: 'Business Card', d: 'Render Distance 2' } },
                { id: 'st7', icon: '🎞️', pct: 5, group: 'fps', ru: { n: 'Пентиум', d: 'ФПС 30' }, en: { n: 'Pentium', d: 'FPS 30' } },
                { id: 'st8', icon: '🎞️', pct: 10, group: 'fps', ru: { n: 'Микроволновка', d: 'ФПС 20' }, en: { n: 'Microwave', d: 'FPS 20' } },
                { id: 'st9', icon: '🎞️', pct: 20, group: 'fps', ru: { n: 'Картошка', d: 'ФПС 10' }, en: { n: 'Potato', d: 'FPS 10' } },
                { id: 'st10', icon: '🐭', pct: 25, group: null, ru: { n: 'Ломка', d: 'Инверсия Мыши' }, en: { n: 'Withdrawal', d: 'Inverted Mouse' } },
                { id: 'st11', icon: '🖱️', pct: 15, group: 'sens', ru: { n: 'Челледж 1', d: 'Минимальная Чувствительность' }, en: { n: 'Challenge 1', d: 'Min Sensitivity' } },
                { id: 'st12', icon: '🖱️', pct: 15, group: 'sens', ru: { n: 'Челледж 2', d: 'Максимальная Чувствительность' }, en: { n: 'Challenge 2', d: 'Max Sensitivity' } },
                { id: 'st13', icon: '🔊', pct: 10, group: 'sound', ru: { n: 'БАССЫ', d: 'Максимальные Звуки' }, en: { n: 'BASS', d: 'Max Volume' } },
                { id: 'st14', icon: '🔇', pct: 15, group: 'sound', ru: { n: 'Старушка', d: 'Без Звука' }, en: { n: 'Granny', d: 'No Sound' } }
            ]},
            { id: 'cat_oth', key: 'other', color: 'var(--cat-other)', hex: '#eccc68', items: [
                { id: 'o1', icon: '⏳', pct: 30, group: null, ru: { n: 'Поторопимся', d: 'Спидран (За 1.5 Часа)' }, en: { n: 'Hurry Up', d: 'Speedrun (1.5 Hours)' } },
                { id: 'o2', icon: '📜', pct: 10, group: null, ru: { n: 'Кино', d: 'Боссы Строго По Порядку' }, en: { n: 'Movie', d: 'Bosses in Strict Order' } },
                { id: 'o3', icon: '🗺️', pct: 25, group: null, ru: { n: 'Олд Форест', d: 'Без Магической Карты' }, en: { n: 'Old Forest', d: 'No Magic Map' } },
                { id: 'o4', icon: '☮️', pct: 30, group: null, ru: { n: 'Пацифист', d: 'Без Убийств' }, en: { n: 'Pacifist', d: 'No Kills' } }
            ]}
        ];

        let state = {
            lang: 'ru',
            theme: 'dark',
            selected: new Map(),
            flatMods: []
        };

        rawData.forEach(cat => {
            cat.items.forEach(item => {
                state.flatMods.push({ ...item, catKey: cat.key, catColor: cat.color, catHex: cat.hex });
            });
        });

        const els = {
            title: document.getElementById('app-title'),
            tabManual: document.getElementById('tab-manual'),
            tabRoulette: document.getElementById('tab-roulette'),
            summaryTitle: document.getElementById('summary-title'),
            totalPct: document.getElementById('total-pct'),
            spinBtn: document.getElementById('spin-btn'),
            modalClose: document.getElementById('modal-close'),
            container: document.getElementById('categories-container'),
            selList: document.getElementById('selected-list')
        };

        function updateUI() {
            const t = i18n[state.lang];
            els.title.textContent = t.title;
            els.tabManual.textContent = t.tabManual;
            els.tabRoulette.textContent = t.tabRoulette;
            els.summaryTitle.textContent = t.summaryTitle;
            els.spinBtn.textContent = t.spinBtn;
            els.modalClose.textContent = t.closeBtn;

            els.container.innerHTML = '';
            rawData.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'category-card';
                card.style.setProperty('--cat-color', cat.color);

                const title = document.createElement('div');
                title.className = 'category-title';
                title.textContent = t.cats[cat.key];
                card.appendChild(title);

                cat.items.forEach(item => {
                    const el = document.createElement('div');
                    el.className = `modifier-item ${state.selected.has(item.id) ? 'selected' : ''}`;
                    el.dataset.id = item.id;
                    el.dataset.group = item.group || '';
                    
                    const data = item[state.lang];
                    el.innerHTML = `
                        <div class="mod-info">
                            <span class="mod-icon">${item.icon}</span>
                            <div>
                                <div class="mod-name">${data.n}</div>
                                <span class="mod-desc">${data.d}</span>
                            </div>
                        </div>
                        <span class="mod-pct">${item.pct}%</span>
                    `;

                    el.addEventListener('click', () => toggleMod(item, el));
                    card.appendChild(el);
                });
                els.container.appendChild(card);
            });
            updateSummary();
            checkMutuallyExclusiveUI();
        }

        function toggleMod(item, element) {
            if (state.selected.has(item.id)) {
                state.selected.delete(item.id);
                element.classList.remove('selected');
            } else {
                if (item.group) {
                    for (let [selId, selItem] of state.selected.entries()) {
                        if (selItem.group === item.group) {
                            state.selected.delete(selId);
                            const oldEl = document.querySelector(`.modifier-item[data-id="${selId}"]`);
                            if (oldEl) oldEl.classList.remove('selected');
                        }
                    }
                }
                state.selected.set(item.id, item);
                element.classList.add('selected');
            }
            updateSummary();
            checkMutuallyExclusiveUI();
        }

        function checkMutuallyExclusiveUI() {
            const allEls = document.querySelectorAll('.modifier-item');
            allEls.forEach(el => el.classList.remove('disabled'));
            
            const activeGroups = new Set();
            for (let item of state.selected.values()) {
                if (item.group) activeGroups.add(item.group);
            }

            allEls.forEach(el => {
                const grp = el.dataset.group;
                if (grp && activeGroups.has(grp) && !el.classList.contains('selected')) {
                    el.classList.add('disabled');
                }
            });
        }

        function updateSummary() {
            let total = 0;
            els.selList.innerHTML = '';
            
            for (let item of state.selected.values()) {
                total += item.pct;
                const catInfo = rawData.find(c => c.items.some(i => i.id === item.id));
                const data = item[state.lang];
                
                const d = document.createElement('div');
                d.className = 'selected-item';
                d.innerHTML = `
                    <span style="color: ${catInfo.color}">
                        ${item.icon} ${data.n}
                    </span>
                    <span style="color: var(--text-main); font-weight: 800;">${item.pct}%</span>
                `;
                els.selList.appendChild(d);
            }
            els.totalPct.textContent = `${total}%`;
        }

        document.getElementById('lang-toggle').addEventListener('click', () => {
            state.lang = state.lang === 'ru' ? 'en' : 'ru';
            updateUI();
            drawWheel();
        });

        document.getElementById('theme-toggle').addEventListener('click', () => {
            state.theme = state.theme === 'dark' ? 'light' : 'dark';
            if (state.theme === 'light') {
                document.body.setAttribute('data-theme', 'light');
            } else {
                document.body.removeAttribute('data-theme');
            }
        });

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                e.target.classList.add('active');
                document.getElementById(e.target.dataset.target).classList.add('active');
            });
        });

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const size = 1000; 
        canvas.width = size;
        canvas.height = size;
        
        let currentAngle = 0;
        let isSpinning = false;
        let angularVelocity = 0;
        let spinRaf;

        function drawWheel() {
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size / 2 - 20;
            const total = state.flatMods.length;
            const sliceAngle = (2 * Math.PI) / total;

            ctx.clearRect(0, 0, size, size);

            for (let i = 0; i < total; i++) {
                const mod = state.flatMods[i];
                const startAngle = currentAngle + i * sliceAngle;
                const endAngle = startAngle + sliceAngle;

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.fillStyle = mod.catHex;
                ctx.fill();
                ctx.lineWidth = 4;
                ctx.strokeStyle = state.theme === 'light' ? '#ffffff' : '#000000';
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 26px Montserrat";
                ctx.shadowColor = "rgba(0,0,0,0.8)";
                ctx.shadowBlur = 4;
                
                const textX = radius - 40;
                ctx.fillText(`${mod.icon} ${mod.pct}%`, textX, 8);
                ctx.restore();
            }
        }

        function physicsLoop() {
            if (!isSpinning) return;
            
            currentAngle += angularVelocity;
            angularVelocity *= 0.992; 

            if (angularVelocity < 0.001) {
                isSpinning = false;
                angularVelocity = 0;
                finishSpin();
            } else {
                drawWheel();
                spinRaf = requestAnimationFrame(physicsLoop);
            }
        }

        els.spinBtn.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;
            els.spinBtn.disabled = true;
            angularVelocity = Math.random() * 0.2 + 0.3; 
            physicsLoop();
        });

        function finishSpin() {
            const total = state.flatMods.length;
            const sliceAngle = (2 * Math.PI) / total;
            let normalizedAngle = currentAngle % (2 * Math.PI);
            if (normalizedAngle < 0) normalizedAngle += 2 * Math.PI;
            
            let pointerAngle = 0; 
            let relativeAngle = (pointerAngle - normalizedAngle + 2 * Math.PI) % (2 * Math.PI);
            let winningIndex = Math.floor(relativeAngle / sliceAngle);
            
            winningIndex = (total - winningIndex) % total;
            
            const result = state.flatMods[winningIndex];
            showResultModal(result);
            els.spinBtn.disabled = false;
            drawWheel(); 
        }

        function showResultModal(item) {
            const t = i18n[state.lang];
            const data = item[state.lang];
            
            document.getElementById('res-icon').textContent = item.icon;
            document.getElementById('res-name').textContent = data.n;
            document.getElementById('res-pct').textContent = `${t.chance}: ${item.pct}% | ${t.cat}: ${t.cats[item.catKey]}`;
            document.getElementById('res-desc').textContent = data.d;
            
            const modal = document.getElementById('modal-content');
            modal.style.setProperty('--modal-color', item.catHex);
            modal.style.boxShadow = `0 30px 60px ${item.catHex}40`;

            document.getElementById('result-modal').classList.add('show');
        }

        els.modalClose.addEventListener('click', () => {
            document.getElementById('result-modal').classList.remove('show');
        });

        updateUI();
        drawWheel();

    </script>
</body>
</html>
