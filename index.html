<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление Модификаторами</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f13;
            --surface: rgba(30, 30, 36, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #a0a0a5;
            --accent: #6c5ce7;
            --accent-hover: #8172fa;
            
            --cat-player: #ff4757;
            --cat-inventory: #ffa502;
            --cat-rules: #9b59b6;
            --cat-effects: #2ed573;
            --cat-spawn: #ff6348;
            --cat-settings: #1e90ff;
            --cat-other: #eccc68;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-weight: 800;
            font-size: 24px;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(108, 92, 231, 0.4);
        }

        main {
            flex: 1;
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .section {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .manual-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
        }

        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .category-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            backdrop-filter: blur(10px);
        }

        .category-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-title::before {
            content: '';
            display: block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--cat-color);
            box-shadow: 0 0 10px var(--cat-color);
        }

        .modifier-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            position: relative;
        }

        .modifier-item:hover {
            border-color: var(--border);
            background: rgba(255, 255, 255, 0.05);
        }

        .modifier-item.selected {
            border-color: var(--cat-color);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
        }

        .mod-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .mod-icon {
            font-size: 20px;
        }

        .mod-name {
            font-weight: 600;
            font-size: 14px;
        }

        .mod-pct {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 800;
            color: var(--cat-color);
        }

        .tooltip {
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background: #2d3436;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            pointer-events: none;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .modifier-item:hover .tooltip {
            opacity: 1;
            visibility: visible;
            bottom: 125%;
        }

        .summary-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            position: sticky;
            top: 100px;
            height: fit-content;
            backdrop-filter: blur(10px);
        }

        .summary-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 20px;
            text-align: center;
            color: var(--accent);
        }

        .total-pct {
            font-size: 48px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(108, 92, 231, 0.5);
        }

        .selected-list {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .selected-list::-webkit-scrollbar {
            width: 5px;
        }
        .selected-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }

        .selected-item {
            font-size: 13px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
        }

        .roulette-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }

        .wheel-wrapper {
            position: relative;
            width: 500px;
            height: 500px;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.5));
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transform: rotate(-90deg); 
        }

        .pointer {
            position: absolute;
            top: 50%;
            right: -20px;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: white;
            clip-path: polygon(100% 50%, 0 0, 0 100%);
            z-index: 10;
            filter: drop-shadow(-2px 0 5px rgba(0,0,0,0.5));
        }

        .spin-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: 800;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.4);
            transition: all 0.2s;
        }

        .spin-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(108, 92, 231, 0.6);
        }

        .spin-btn:active {
            transform: translateY(2px);
        }

        .spin-btn:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            transform: scale(0.8);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .modal-overlay.show .modal {
            transform: scale(1);
        }

        .modal-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .modal-name {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .modal-pct {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .modal-desc {
            font-size: 16px;
            color: var(--text-muted);
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .modal-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid var(--border);
            padding: 10px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .modal-btn:hover {
            background: rgba(255,255,255,0.2);
        }

    </style>
</head>
<body>

    <header>
        <h1>Управление Модификаторами</h1>
        <div class="tabs">
            <button class="tab-btn active" data-target="manual">Мануальный Выбор</button>
            <button class="tab-btn" data-target="roulette">Рулетка</button>
        </div>
    </header>

    <main>
        <section id="manual" class="section active">
            <div class="manual-layout">
                <div class="categories" id="categories-container"></div>
                <aside class="summary-panel">
                    <div class="summary-title">Итоговая Сложность</div>
                    <div class="total-pct" id="total-pct">0%</div>
                    <div class="selected-list" id="selected-list"></div>
                </aside>
            </div>
        </section>

        <section id="roulette" class="section">
            <div class="roulette-container">
                <div class="wheel-wrapper">
                    <canvas id="wheel" width="1000" height="1000"></canvas>
                    <div class="pointer"></div>
                </div>
                <button class="spin-btn" id="spin-btn">Крутить Колесо</button>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="result-modal">
        <div class="modal" id="modal-content">
            <div class="modal-icon" id="res-icon"></div>
            <div class="modal-name" id="res-name"></div>
            <div class="modal-pct" id="res-pct"></div>
            <div class="modal-desc" id="res-desc"></div>
            <button class="modal-btn" onclick="document.getElementById('result-modal').classList.remove('show')">Закрыть</button>
        </div>
    </div>

    <script>
        const categoriesData = [
            {
                name: "Игрок",
                color: "var(--cat-player)",
                colorHex: "#ff4757",
                items: [
                    { icon: "🛡️", name: "Безащитный", pct: 25, desc: "Без Брони" },
                    { icon: "⚔️", name: "Доброе Сердце", pct: 30, desc: "Без Оружия" },
                    { icon: "🛠️", name: "Неуч", pct: 50, desc: "Без Крафта" }
                ]
            },
            {
                name: "Инвентарь",
                color: "var(--cat-inventory)",
                colorHex: "#ffa502",
                items: [
                    { icon: "📦", name: "Склад", pct: 10, desc: "Свободных Слотов 18" },
                    { icon: "🎒", name: "Пора В Школу", pct: 20, desc: "Свободных Слотов 9" },
                    { icon: "🙌", name: "Только 2 Руки", pct: 35, desc: "Свободных Слотов 2" },
                    { icon: "🖐️", name: "Однорукий", pct: 50, desc: "Свободных Слотов 1" }
                ]
            },
            {
                name: "Игровые Правила",
                color: "var(--cat-rules)",
                colorHex: "#9b59b6",
                items: [
                    { icon: "❌", name: "Ванила На То И Ванила", pct: 15, desc: "Без Сохранения Инвентаря" },
                    { icon: "🍔", name: "Ранимый", pct: 30, desc: "Без Натуральной Регенерации" },
                    { icon: "❤️", name: "Последний Шанс", pct: 30, desc: "На Хардкоре" },
                    { icon: "🎛️", name: "Потеряшка", pct: 15, desc: "Без ф3 панели" },
                    { icon: "📸", name: "ГТА 67", pct: 20, desc: "Только От 3-го Лица" }
                ]
            },
            {
                name: "Эффекты",
                color: "var(--cat-effects)",
                colorHex: "#2ed573",
                items: [
                    { icon: "👀", name: "Крот", pct: 20, desc: "Постоянная Слепота" },
                    { icon: "📉", name: "Пропускал День Качалочкее", pct: 30, desc: "Постоянная Слабость" },
                    { icon: "🍽️", name: "Литафом", pct: 35, desc: "Постоянный Голод" },
                    { icon: "🤮", name: "Тошнотик", pct: 20, desc: "Постоянная Тошнота" },
                    { icon: "🐌", name: "Улитка", pct: 5, desc: "Постоянная Минусовая Скорость" },
                    { icon: "🧦", name: "Невесомость", pct: 10, desc: "Постоянное Плавное Падение" },
                    { icon: "🌿", name: "Постоянная Боль", pct: 50, desc: "Постоянное Отравление" }
                ]
            },
            {
                name: "Спавнрейт",
                color: "var(--cat-spawn)",
                colorHex: "#ff6348",
                items: [
                    { icon: "💔", name: "Митинг", pct: 5, desc: "Частота Появления Монстров 1" },
                    { icon: "💀", name: "Армагедон", pct: 15, desc: "Частота Появления Монстров 3" },
                    { icon: "☠️", name: "Апокалипсис", pct: 25, desc: "Частота Появления Монстров 5" }
                ]
            },
            {
                name: "Настройки Майнкрафта",
                color: "var(--cat-settings)",
                colorHex: "#1e90ff",
                items: [
                    { icon: "👁️", name: "Не Те Очки", pct: 5, desc: "Поле Зрения: 60" },
                    { icon: "👁️", name: "Соколиный Глаз", pct: 10, desc: "Поле Зрения: 45" },
                    { icon: "👁️", name: "Шоколадный Глаз", pct: 15, desc: "Поле Зрения: 30" },
                    { icon: "🧭", name: "Гугл GPS", pct: 5, desc: "Прорисовка 6 Чанка" },
                    { icon: "🧭", name: "Карта", pct: 10, desc: "Прорисовка 4 Чанка" },
                    { icon: "🧭", name: "Визитка", pct: 15, desc: "Прорисовка 2 Чанка" },
                    { icon: "🎞️", name: "Пентиум", pct: 5, desc: "Фпс 30" },
                    { icon: "🎞️", name: "Микроволновка", pct: 10, desc: "Фпс 20" },
                    { icon: "🎞️", name: "Картошка", pct: 20, desc: "Фпс 10" },
                    { icon: "🐭", name: "Ломка", pct: 25, desc: "Инверсия Мыши" },
                    { icon: "🖱️", name: "Челледж От Дамдома 1", pct: 15, desc: "Минимальная Чувствительность" },
                    { icon: "🖱️", name: "Челледж От Дамдома 2", pct: 15, desc: "Максимальная Чувствительность" },
                    { icon: "🔊", name: "БАССЫ", pct: 10, desc: "Максимальные Звуки" },
                    { icon: "🔇", name: "Старушка", pct: 15, desc: "Без Звука" }
                ]
            },
            {
                name: "Прочее",
                color: "var(--cat-other)",
                colorHex: "#eccc68",
                items: [
                    { icon: "⏳", name: "Поторопимся", pct: 30, desc: "Спидранн (За 1.5 Часа)" },
                    { icon: "📜", name: "Кино", pct: 10, desc: "Боссы Только Строго По Порядку" },
                    { icon: "🗺️", name: "Олд Форест", pct: 25, desc: "Без Магической Карты" },
                    { icon: "☮️", name: "Пацифист", pct: 30, desc: "Без Убийств" }
                ]
            }
        ];

        let selectedItems = new Set();
        const allModifiers = [];

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                e.target.classList.add('active');
                document.getElementById(e.target.dataset.target).classList.add('active');
            });
        });

        const container = document.getElementById('categories-container');
        categoriesData.forEach((cat, catIndex) => {
            const card = document.createElement('div');
            card.className = 'category-card';
            card.style.setProperty('--cat-color', cat.color);

            const title = document.createElement('div');
            title.className = 'category-title';
            title.textContent = cat.name;
            card.appendChild(title);

            cat.items.forEach((item, itemIndex) => {
                const uniqueId = `${catIndex}-${itemIndex}`;
                allModifiers.push({ ...item, colorHex: cat.colorHex, catName: cat.name });

                const modDiv = document.createElement('div');
                modDiv.className = 'modifier-item';
                modDiv.dataset.id = uniqueId;
                
                modDiv.innerHTML = `
                    <div class="mod-info">
                        <span class="mod-icon">${item.icon}</span>
                        <span class="mod-name">${item.name}</span>
                    </div>
                    <span class="mod-pct">${item.pct}%</span>
                    <div class="tooltip">${item.desc}</div>
                `;

                modDiv.addEventListener('click', () => {
                    modDiv.classList.toggle('selected');
                    if (modDiv.classList.contains('selected')) {
                        selectedItems.add({ id: uniqueId, ...item, color: cat.color });
                    } else {
                        selectedItems.forEach(i => {
                            if (i.id === uniqueId) selectedItems.delete(i);
                        });
                    }
                    updateSummary();
                });

                card.appendChild(modDiv);
            });

            container.appendChild(card);
        });

        function updateSummary() {
            let total = 0;
            const list = document.getElementById('selected-list');
            list.innerHTML = '';

            selectedItems.forEach(item => {
                total += item.pct;
                const el = document.createElement('div');
                el.className = 'selected-item';
                el.innerHTML = `
                    <span style="color: ${item.color}">${item.icon} ${item.name}</span>
                    <span>${item.pct}%</span>
                `;
                list.appendChild(el);
            });

            document.getElementById('total-pct').textContent = `${total}%`;
        }

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const totalSlices = allModifiers.length;
        const arc = Math.PI / (totalSlices / 2);
        let currentAngle = 0;
        let spinTimeout = null;
        let spinAngleStart = 0;
        let spinTime = 0;
        let spinTimeTotal = 0;

        function drawRouletteWheel() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const outsideRadius = 480;
            const textRadius = 380;
            const insideRadius = 50;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.lineWidth = 10;
            ctx.strokeStyle = '#1e1e24';

            for (let i = 0; i < totalSlices; i++) {
                const angle = currentAngle + i * arc;
                
                ctx.fillStyle = allModifiers[i].colorHex;
                ctx.beginPath();
                ctx.arc(centerX, centerY, outsideRadius, angle, angle + arc, false);
                ctx.arc(centerX, centerY, insideRadius, angle + arc, angle, true);
                ctx.fill();
                ctx.stroke();

                ctx.save();
                ctx.fillStyle = "#ffffff";
                ctx.translate(
                    centerX + Math.cos(angle + arc / 2) * textRadius,
                    centerY + Math.sin(angle + arc / 2) * textRadius
                );
                ctx.rotate(angle + arc / 2 + Math.PI);
                
                ctx.font = "bold 24px Inter";
                ctx.textAlign = "left";
                ctx.textBaseline = "middle";
                ctx.fillText(`${allModifiers[i].icon} ${allModifiers[i].pct}%`, -40, 0);
                
                ctx.restore();
            }

            ctx.fillStyle = "#0f0f13";
            ctx.beginPath();
            ctx.arc(centerX, centerY, insideRadius, 0, 2 * Math.PI);
            ctx.fill();
            ctx.stroke();
        }

        document.getElementById('spin-btn').addEventListener('click', () => {
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            spinAngleStart = Math.random() * 10 + 10;
            spinTime = 0;
            spinTimeTotal = Math.random() * 3000 + 4000;
            rotateWheel();
        });

        function rotateWheel() {
            spinTime += 30;
            if (spinTime >= spinTimeTotal) {
                stopRotateWheel();
                return;
            }
            const spinAngle = spinAngleStart - easeOut(spinTime, 0, spinAngleStart, spinTimeTotal);
            currentAngle += (spinAngle * Math.PI / 180);
            drawRouletteWheel();
            spinTimeout = requestAnimationFrame(rotateWheel);
        }

        function stopRotateWheel() {
            cancelAnimationFrame(spinTimeout);
            const degrees = currentAngle * 180 / Math.PI + 90;
            const arcd = arc * 180 / Math.PI;
            const index = Math.floor((360 - degrees % 360) / arcd) % totalSlices;
            
            const result = allModifiers[index];
            showResult(result);
            document.getElementById('spin-btn').disabled = false;
        }

        function easeOut(t, b, c, d) {
            const ts = (t /= d) * t;
            const tc = ts * t;
            return b + c * (tc + -3 * ts + 3 * t);
        }

        function showResult(item) {
            document.getElementById('res-icon').textContent = item.icon;
            document.getElementById('res-name').textContent = item.name;
            
            const pctEl = document.getElementById('res-pct');
            pctEl.textContent = `Шанс: ${item.pct}% | Категория: ${item.catName}`;
            pctEl.style.color = item.colorHex;

            document.getElementById('res-desc').textContent = item.desc;
            
            document.getElementById('modal-content').style.borderColor = item.colorHex;
            document.getElementById('modal-content').style.boxShadow = `0 20px 50px ${item.colorHex}40`;

            document.getElementById('result-modal').classList.add('show');
        }

        drawRouletteWheel();
    </script>
</body>
</html>
