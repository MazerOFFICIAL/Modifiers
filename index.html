<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifiers Manager PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --surface: rgba(20, 20, 25, 0.6);
            --surface-hover: rgba(40, 40, 50, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --border-active: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: #8a8a93;
            --accent: #00f0ff;
            --accent-glow: rgba(0, 240, 255, 0.4);
            --danger: #ff0055;
            --success: #00ff88;
            
            --cat-player: #ff4757;
            --cat-inventory: #ffa502;
            --cat-rules: #9b59b6;
            --cat-effects: #2ed573;
            --cat-spawn: #ff6348;
            --cat-settings: #1e90ff;
            --cat-other: #eccc68;

            --font-main: 'Montserrat', sans-serif;
            --wheel-size: 500px;
        }

        [data-theme="light"] {
            --bg-color: #f0f2f5;
            --surface: rgba(255, 255, 255, 0.7);
            --surface-hover: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.1);
            --border-active: rgba(0, 0, 0, 0.3);
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --accent: #0055ff;
            --accent-glow: rgba(0, 85, 255, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); user-select: none; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 15% 50%, rgba(255, 71, 87, 0.05), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(0, 240, 255, 0.05), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        header {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area h1 { font-weight: 900; font-size: 22px; text-transform: uppercase; background: linear-gradient(45deg, var(--text-main), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .controls-area { display: flex; gap: 15px; }
        .icon-btn { background: transparent; border: 1px solid var(--border); color: var(--text-main); width: 40px; height: 40px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.3s; }
        .icon-btn:hover { background: var(--surface-hover); border-color: var(--border-active); transform: translateY(-2px); }

        .tabs { display: flex; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 14px; border: 1px solid var(--border); }
        .tab-btn { background: transparent; border: none; color: var(--text-muted); padding: 8px 24px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 14px; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent-glow); }

        main { flex: 1; padding: 30px; width: 100%; max-width: 1800px; margin: 0 auto; }
        .section { display: none; opacity: 0; transform: translateY(20px); transition: 0.4s; }
        .section.active { display: block; opacity: 1; transform: translateY(0); }

        /* --- РУЧНОЙ ВЫБОР (МАНУАЛ) --- */
        .manual-layout { display: grid; grid-template-columns: 1fr 350px; gap: 30px; align-items: start; }
        .categories { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; align-items: start; }
        
        .category-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; backdrop-filter: blur(10px); }
        .category-title { font-size: 16px; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
        .category-title::before { content: ''; display: block; width: 12px; height: 12px; border-radius: 3px; background-color: var(--cat-color); box-shadow: 0 0 10px var(--cat-color); transform: rotate(45deg); }

        .modifier-item { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        [data-theme="light"] .modifier-item { background: rgba(255,255,255,0.5); }
        .modifier-item:hover { background: var(--surface-hover); transform: translateX(4px); }
        .modifier-item.selected { border-color: var(--cat-color); background: linear-gradient(90deg, rgba(255,255,255,0.05), transparent); box-shadow: inset 4px 0 0 var(--cat-color); }
        
        /* Изменение: Убрали pointer-events: none, чтобы можно было кликать на серые */
        .modifier-item.disabled { opacity: 0.4; filter: grayscale(1); }

        .mod-info { display: flex; align-items: center; gap: 10px; }
        .mod-name { font-weight: 700; font-size: 13px; }
        .mod-desc { font-size: 10px; color: var(--text-muted); display: block; margin-top: 2px; }
        .mod-pct { background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 900; color: var(--cat-color); border: 1px solid rgba(255,255,255,0.05); }

        .summary-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 25px; position: sticky; top: 100px; backdrop-filter: blur(20px); max-height: calc(100vh - 120px); display: flex; flex-direction: column; }
        .total-pct { font-size: 54px; font-weight: 900; margin-bottom: 20px; text-align: center; color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); line-height: 1; }
        .selected-list { overflow-y: auto; padding-right: 5px; flex: 1; }
        .selected-list::-webkit-scrollbar { width: 4px; }
        .selected-list::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 10px; }
        
        .selected-item { font-size: 13px; padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-weight: 600; }

        /* --- РУЛЕТКА --- */
        .roulette-layout { display: grid; grid-template-columns: 320px 1fr 320px; gap: 30px; height: calc(100vh - 140px); }
        
        .side-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .side-panel h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 15px; text-align: center; }
        .panel-content { flex: 1; overflow-y: auto; padding-right: 5px; }
        .panel-content::-webkit-scrollbar { width: 4px; }
        .panel-content::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 10px; }

        .pool-cat-group { margin-bottom: 15px; }
        .pool-cat-title { font-size: 12px; font-weight: 800; color: var(--cat-color); margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 5px; cursor: pointer; transition: 0.2s; }
        .toggle-row:hover { background: rgba(255,255,255,0.05); }
        .toggle-row.disabled { opacity: 0.5; }
        .toggle-name { font-size: 12px; font-weight: 600; flex: 1; }
        
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.1); transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(14px); }

        .rolled-item { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; margin-bottom: 8px; border-left: 4px solid var(--cat-color); animation: slideIn 0.3s ease; }
        .rolled-item-del { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 16px; opacity: 0.7; transition: 0.2s; padding: 0 5px; }
        .rolled-item-del:hover { opacity: 1; transform: scale(1.2); }

        .center-stage { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        .spin-settings { background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 10px 20px; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; backdrop-filter: blur(10px); }
        .spin-settings input { background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #fff; width: 60px; padding: 5px; border-radius: 6px; text-align: center; font-weight: 800; font-family: var(--font-main); }
        
        .wheel-wrapper { position: relative; width: var(--wheel-size); height: var(--wheel-size); border-radius: 50%; background: #000; box-shadow: 0 0 0 8px rgba(255,255,255,0.05), 0 20px 50px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; }
        
        .wheel-center { position: absolute; width: 60px; height: 60px; background: var(--bg-color); border-radius: 50%; z-index: 10; border: 4px solid var(--border-active); box-shadow: 0 0 20px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }
        .wheel-center::after { content: ''; width: 20px; height: 20px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 15px var(--accent-glow); }

        .pointer-wrapper { position: absolute; top: 50%; right: -25px; transform: translateY(-50%); z-index: 20; filter: drop-shadow(-5px 0 10px rgba(0,0,0,0.6)); }
        .pointer { width: 50px; height: 40px; background: var(--text-main); clip-path: polygon(100% 0, 0 50%, 100% 100%); }

        .spin-btn { margin-top: 40px; background: var(--accent); color: #000; border: none; padding: 16px 50px; font-size: 18px; font-weight: 900; border-radius: 100px; cursor: pointer; text-transform: uppercase; box-shadow: 0 10px 30px var(--accent-glow); transition: 0.3s; }
        .spin-btn:hover { transform: scale(1.05); box-shadow: 0 15px 40px var(--accent-glow); }
        .spin-btn:disabled { background: var(--surface-hover); color: var(--text-muted); box-shadow: none; cursor: not-allowed; transform: none; }

        /* --- МОДАЛЬНОЕ ОКНО --- */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: 0.4s; }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 40px; text-align: center; max-width: 450px; width: 90%; transform: scale(0.9) translateY(20px); transition: 0.4s; position: relative; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        .modal-overlay.show .modal { transform: scale(1) translateY(0); }
        .modal::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: var(--modal-color, var(--accent)); }
        
        .modal-name { font-size: 28px; font-weight: 900; margin-top: 10px; margin-bottom: 5px; }
        .modal-cat { font-size: 14px; font-weight: 700; color: var(--modal-color); margin-bottom: 20px; text-transform: uppercase; }
        
        /* 2 Кнопки */
        .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        
        .m-btn { padding: 14px 20px; border-radius: 12px; font-weight: 800; cursor: pointer; border: none; font-size: 14px; transition: 0.2s; text-transform: uppercase; }
        .btn-add { background: var(--success); color: #000; }
        .btn-add:hover { box-shadow: 0 0 20px rgba(0, 255, 136, 0.4); transform: translateY(-2px); }
        .btn-spin { background: transparent; color: var(--text-main); border: 1px solid var(--border-active); }
        .btn-spin:hover { background: var(--surface-hover); transform: translateY(-2px); }

        @media (max-width: 1400px) {
            .roulette-layout { grid-template-columns: 250px 1fr 250px; }
            :root { --wheel-size: 400px; }
        }
        @media (max-width: 900px) {
            .roulette-layout { grid-template-columns: 1fr; height: auto; }
            .side-panel { height: 400px; }
            .manual-layout { grid-template-columns: 1fr; }
            .summary-panel { position: static; max-height: none; }
            .modal-actions { grid-template-columns: 1fr; }
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <header>
        <div class="logo-area"><h1 id="app-title">Modifiers PRO</h1></div>
        <div class="tabs" id="nav-tabs">
            <button class="tab-btn active" data-target="manual" id="tab-manual">Manual</button>
            <button class="tab-btn" data-target="roulette" id="tab-roulette">Roulette</button>
        </div>
        <div class="controls-area">
            <button class="icon-btn" id="lang-toggle">🌐</button>
            <button class="icon-btn" id="theme-toggle">🌓</button>
        </div>
    </header>

    <main>
        <section id="manual" class="section active">
            <div class="manual-layout">
                <div class="categories" id="manual-container"></div>
                <aside class="summary-panel">
                    <div class="total-pct" id="total-pct">0%</div>
                    <div class="selected-list" id="manual-selected-list"></div>
                </aside>
            </div>
        </section>

        <section id="roulette" class="section">
            <div class="roulette-layout">
                <aside class="side-panel left-panel">
                    <h3 id="t-pool">Wheel Pool</h3>
                    <div class="panel-content" id="pool-list"></div>
                </aside>

                <div class="center-stage">
                    <div class="spin-settings">
                        <label id="t-time">Time (sec):</label>
                        <input type="number" id="spin-time-input" value="5" min="1" max="15">
                    </div>
                    <div class="wheel-wrapper">
                        <canvas id="wheel"></canvas>
                        <div class="wheel-center"></div>
                        <div class="pointer-wrapper"><div class="pointer"></div></div>
                    </div>
                    <button class="spin-btn" id="spin-btn">Spin Wheel</button>
                </div>

                <aside class="side-panel right-panel">
                    <h3 id="t-inventory">Rolled Modifiers</h3>
                    <div class="panel-content" id="rolled-list"></div>
                </aside>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="result-modal">
        <div class="modal" id="modal-content">
            <div style="font-size: 50px" id="res-icon"></div>
            <div class="modal-name" id="res-name"></div>
            <div class="modal-cat" id="res-cat"></div>
            <div style="font-size: 14px; color: var(--text-muted); margin-bottom: 10px;" id="res-desc"></div>
            
            <div class="modal-actions">
                <button class="m-btn btn-add" id="btn-action-add"></button>
                <button class="m-btn btn-spin" id="btn-spin-again"></button>
            </div>
        </div>
    </div>

                { id: 'st2', icon: '👁️', pct: 10, group: 'fov', ru: { n: 'Соколиный Глаз', d: 'FOV: 45' }, en: { n: 'Hawk Eye', d: 'FOV: 45' } },
                { id: 'st3', icon: '👁️', pct: 15, group: 'fov', ru: { n: 'Шоколадный Глаз', d: 'FOV: 30' }, en: { n: 'Chocolate Eye', d: 'FOV: 30' } },
                { id: 'st4', icon: '🧭', pct: 5, group: 'render', ru: { n: 'Гугл GPS', d: 'Чанки: 6' }, en: { n: 'Google GPS', d: 'Chunks: 6' } },
                { id: 'st5', icon: '🧭', pct: 10, group: 'render', ru: { n: 'Карта', d: 'Чанки: 4' }, en: { n: 'Map', d: 'Chunks: 4' } },
                { id: 'st6', icon: '🧭', pct: 15, group: 'render', ru: { n: 'Визитка', d: 'Чанки: 2' }, en: { n: 'Business Card', d: 'Chunks: 2' } },
                { id: 'st7', icon: '🎞️', pct: 5, group: 'fps', ru: { n: 'Пентиум', d: 'FPS 30' }, en: { n: 'Pentium', d: 'FPS 30' } },
                { id: 'st8', icon: '🎞️', pct: 10, group: 'fps', ru: { n: 'Микроволновка', d: 'FPS 20' }, en: { n: 'Microwave', d: 'FPS 20' } },
                { id: 'st9', icon: '🎞️', pct: 20, group: 'fps', ru: { n: 'Картошка', d: 'FPS 10' }, en: { n: 'Potato', d: 'FPS 10' } },
                { id: 'st10', icon: '🐭', pct: 25, group: null, ru: { n: 'Ломка', d: 'Инверсия Мыши' }, en: { n: 'Withdrawal', d: 'Inverted Mouse' } }
            ]},
            { id: 'cat_oth', key: 'other', color: 'var(--cat-other)', hex: '#eccc68', items: [
                { id: 'o1', icon: '⏳', pct: 30, group: null, ru: { n: 'Поторопимся', d: 'Спидран 1.5ч' }, en: { n: 'Hurry Up', d: 'Speedrun 1.5h' } },
                { id: 'o2', icon: '📜', pct: 10, group: null, ru: { n: 'Кино', d: 'Боссы по порядку' }, en: { n: 'Movie', d: 'Bosses in Order' } },
                { id: 'o3', icon: '🗺️', pct: 25, group: null, ru: { n: 'Олд Форест', d: 'Без Карты' }, en: { n: 'Old Forest', d: 'No Map' } },
                { id: 'o4', icon: '☮️', pct: 30, group: null, ru: { n: 'Пацифист', d: 'Без Убийств' }, en: { n: 'Pacifist', d: 'No Kills' } }
            ]}
        ];

        let state = {
            lang: 'ru',
            theme: 'dark',
            manualSelected: new Map(),
            wheelPool: new Set(),
            rolled: [],
            flatMods: new Map(),
            currentWinner: null
        };

        rawData.forEach(cat => {
            cat.items.forEach(item => {
                const fullItem = { ...item, catKey: cat.key, catColor: cat.color, catHex: cat.hex };
                state.flatMods.set(item.id, fullItem);
                state.wheelPool.add(item.id);
            });
        });

        const els = {
            manualCont: document.getElementById('manual-container'),
            poolList: document.getElementById('pool-list'),
            rolledList: document.getElementById('rolled-list'),
            manualSelected: document.getElementById('manual-selected-list'),
            spinBtn: document.getElementById('spin-btn'),
            canvas: document.getElementById('wheel'),
            ctx: document.getElementById('wheel').getContext('2d'),
            modal: document.getElementById('result-modal')
        };
        const size = 1000;
        els.canvas.width = size; els.canvas.height = size;

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                e.target.classList.add('active');
                document.getElementById(e.target.dataset.target).classList.add('active');
            });
        });

        document.getElementById('lang-toggle').addEventListener('click', () => { state.lang = state.lang === 'ru' ? 'en' : 'ru'; updateAllUI(); });
        document.getElementById('theme-toggle').addEventListener('click', () => { 
            state.theme = state.theme === 'dark' ? 'light' : 'dark';
            state.theme === 'light' ? document.body.setAttribute('data-theme', 'light') : document.body.removeAttribute('data-theme');
            drawWheel();
        });

        function updateAllUI() {
            const t = i18n[state.lang];
            document.getElementById('app-title').textContent = t.title;
            document.getElementById('tab-manual').textContent = t.tabManual;
            document.getElementById('tab-roulette').textContent = t.tabRoulette;
            document.getElementById('t-pool').textContent = t.tPool;
            document.getElementById('t-inventory').textContent = t.tInventory;
            document.getElementById('t-time').textContent = t.tTime;
            els.spinBtn.textContent = t.spinBtn;
            document.getElementById('btn-action-add').textContent = t.btnActionAdd;
            document.getElementById('btn-spin-again').textContent = t.btnSpin;

            renderManualTab();
            renderPoolTab();
            renderRolledTab();
            drawWheel();
        }

        function renderManualTab() {
            const t = i18n[state.lang];
            els.manualCont.innerHTML = '';
            
            rawData.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'category-card';
                card.style.setProperty('--cat-color', cat.color);
                card.innerHTML = `<div class="category-title">${t.cats[cat.key]}</div>`;

                cat.items.forEach(item => {
                    const el = document.createElement('div');
                    el.className = `modifier-item ${state.manualSelected.has(item.id) ? 'selected' : ''}`;
                    el.dataset.id = item.id;
                    el.dataset.group = item.group || '';
                    
                    const d = item[state.lang];
                    el.innerHTML = `
                        <div class="mod-info"><span style="font-size: 20px">${item.icon}</span><div><div class="mod-name">${d.n}</div><span class="mod-desc">${d.d}</span></div></div>
                        <span class="mod-pct">${item.pct}%</span>
                    `;
                    el.addEventListener('click', () => {
                        if(state.manualSelected.has(item.id)) { 
                            state.manualSelected.delete(item.id); 
                            el.classList.remove('selected'); 
                        } else {
                            if(item.group) {
                                for(let [sid, sitem] of state.manualSelected) {
                                    if(sitem.group === item.group) { 
                                        state.manualSelected.delete(sid); 
                                        document.querySelector(`.modifier-item[data-id="${sid}"]`)?.classList.remove('selected'); 
                                    }
                                }
                            }
                            state.manualSelected.set(item.id, state.flatMods.get(item.id));
                            el.classList.add('selected');
                        }
                        updateManualSummary();
                        checkManualConflicts();
                    });
                    card.appendChild(el);
                });
                els.manualCont.appendChild(card);
            });
            updateManualSummary();
            checkManualConflicts();
        }

        function checkManualConflicts() {
            const allEls = document.querySelectorAll('#manual-container .modifier-item');
            allEls.forEach(el => el.classList.remove('disabled'));
            const activeGroups = new Set([...state.manualSelected.values()].map(i => i.group).filter(g=>g));
            allEls.forEach(el => {
                if(el.dataset.group && activeGroups.has(el.dataset.group) && !el.classList.contains('selected')) {
                    el.classList.add('disabled');
                }
            });
        }

        function updateManualSummary() {
            let total = 0; els.manualSelected.innerHTML = '';
            for(let item of state.manualSelected.values()) {
                total += item.pct;
                els.manualSelected.innerHTML += `<div class="selected-item"><span style="color:${item.catColor}">${item.icon} ${item[state.lang].n}</span><span>${item.pct}%</span></div>`;
            }
            document.getElementById('total-pct').textContent = `${total}%`;
        }

        function renderPoolTab() {
            const t = i18n[state.lang];
            els.poolList.innerHTML = '';
            
            rawData.forEach(cat => {
                let html = `<div class="pool-cat-group"><div class="pool-cat-title" style="--cat-color:${cat.color}">${t.cats[cat.key]}</div>`;
                cat.items.forEach(item => {
                    const isChecked = state.wheelPool.has(item.id) ? 'checked' : '';
                    html += `
                        <label class="toggle-row">
                            <span class="toggle-name">${item.icon} ${item[state.lang].n}</span>
                            <div class="switch">
                                <input type="checkbox" data-id="${item.id}" class="pool-toggle" ${isChecked}>
                                <span class="slider"></span>
                            </div>
                        </label>
                    `;
                });
                html += `</div>`;
                els.poolList.innerHTML += html;
            });

            document.querySelectorAll('.pool-toggle').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const id = e.target.dataset.id;
                    if(e.target.checked) state.wheelPool.add(id); else state.wheelPool.delete(id);
                    drawWheel();
                });
            });
        }

        function renderRolledTab() {
            els.rolledList.innerHTML = '';
            if(state.rolled.length === 0) {
                els.rolledList.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:12px; margin-top:20px;">Empty</div>`;
                return;
            }
            state.rolled.forEach((item, index) => {
                const el = document.createElement('div');
                el.className = 'rolled-item';
                el.style.setProperty('--cat-color', item.catColor);
                el.innerHTML = `
                    <div style="font-size:12px; font-weight:700;">
                        ${item.icon} ${item[state.lang].n} <span style="color:${item.catColor}">(${item.pct}%)</span>
                    </div>
                    <button class="rolled-item-del" data-index="${index}">✖</button>
                `;
                els.rolledList.appendChild(el);
            });

            document.querySelectorAll('.rolled-item-del').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    state.rolled.splice(e.target.dataset.index, 1);
                    renderRolledTab();
                });
            });
        }

        let currentAngle = 0;
        let isSpinning = false;
        
        function drawWheel() {
            const ctx = els.ctx;
            const cx = size/2, cy = size/2, r = size/2 - 10;
            ctx.clearRect(0, 0, size, size);
            
            const poolArr = Array.from(state.wheelPool).map(id => state.flatMods.get(id));
            if(poolArr.length === 0) {
                ctx.fillStyle = "#333"; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
                els.spinBtn.disabled = true; return;
            }
            els.spinBtn.disabled = false;
            
            const slice = (2 * Math.PI) / poolArr.length;
            
            for(let i=0; i<poolArr.length; i++) {
                const mod = poolArr[i];
                const start = currentAngle + i*slice;
                const end = start + slice;

                ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, start, end);
                ctx.fillStyle = mod.catHex; ctx.fill();
                ctx.lineWidth = 3; ctx.strokeStyle = state.theme === 'light' ? '#fff' : '#000'; ctx.stroke();

                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(start + slice/2);
                ctx.textAlign = "right"; ctx.textBaseline = "middle";
                ctx.fillStyle = "#ffffff"; 
                ctx.font = "bold 22px Montserrat";
                ctx.shadowColor = "rgba(0,0,0,0.8)"; ctx.shadowBlur = 4;
                
                let text = `${mod[state.lang].n} (${mod.pct}%)`;
                ctx.fillText(text, r - 30, 0, r - 80);
                ctx.restore();
            }
        }

        let spinStart = 0;
        let spinDuration = 5000;
        let startAngleStore = 0;
        let targetAngle = 0;

        els.spinBtn.addEventListener('click', startSpin);

        function startSpin() {
            if (isSpinning || state.wheelPool.size === 0) return;
            isSpinning = true; els.spinBtn.disabled = true;
            
            const timeInput = parseFloat(document.getElementById('spin-time-input').value);
            spinDuration = (isNaN(timeInput) || timeInput < 1 ? 5 : timeInput) * 1000;
            
            spinStart = performance.now();
            startAngleStore = currentAngle;
            const extraSpins = (Math.floor(Math.random() * 5) + 5) * Math.PI * 2;
            const randomOffset = Math.random() * Math.PI * 2;
            targetAngle = startAngleStore + extraSpins + randomOffset;
            
            requestAnimationFrame(animateWheel);
        }

        function animateWheel(time) {
            let elapsed = time - spinStart;
            if(elapsed >= spinDuration) {
                currentAngle = targetAngle % (Math.PI * 2);
                drawWheel();
                finishSpin();
                return;
            }
            let t = elapsed / spinDuration;
            let ease = 1 - Math.pow(1 - t, 4);
            currentAngle = startAngleStore + (targetAngle - startAngleStore) * ease;
            
            drawWheel();
            requestAnimationFrame(animateWheel);
        }

        function finishSpin() {
            isSpinning = false; els.spinBtn.disabled = false;
            const poolArr = Array.from(state.wheelPool).map(id => state.flatMods.get(id));
            const slice = (2 * Math.PI) / poolArr.length;
            
            let pointerAngle = Math.PI; 
            let relativeAngle = (pointerAngle - currentAngle + 10*Math.PI) % (2 * Math.PI);
            let winIndex = Math.floor(relativeAngle / slice);
            state.currentWinner = poolArr[winIndex];
            
            showModal();
        }

        function showModal() {
            const mod = state.currentWinner;
            const t = i18n[state.lang];
            
            document.getElementById('res-icon').textContent = mod.icon;
            document.getElementById('res-name').textContent = mod[state.lang].n + ` (${mod.pct}%)`;
            document.getElementById('res-cat').textContent = t.cats[mod.catKey];
            document.getElementById('res-cat').style.color = mod.catHex;
            document.getElementById('res-desc').textContent = mod[state.lang].d;
            
            els.modal.style.setProperty('--modal-color', mod.catHex);
            document.getElementById('result-modal').classList.add('show');
        }

        function closeModal() { document.getElementById('result-modal').classList.remove('show'); }

        document.getElementById('btn-action-add').addEventListener('click', () => {
            state.rolled.push(state.currentWinner);
            
            // Удаляем сам выигранный мод
            state.wheelPool.delete(state.currentWinner.id);

            // Удаляем ВСЕ остальные моды из этой же группы
            if (state.currentWinner.group) {
                for (let id of state.wheelPool) {
                    const mod = state.flatMods.get(id);
                    if (mod && mod.group === state.currentWinner.group) {
                        state.wheelPool.delete(id);
                    }
                }
            }

            renderRolledTab();
            renderPoolTab();
            drawWheel();
            closeModal();
        });

        document.getElementById('btn-spin-again').addEventListener('click', () => {
            closeModal();
            setTimeout(startSpin, 300);
        });

        updateAllUI();

    </script>
</body>
</html>
