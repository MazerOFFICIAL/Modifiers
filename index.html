<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifiers</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e0c09;
            --bg2: #141208;
            --bg3: #1a1710;
            --surface: #1e1b13;
            --surface2: #252118;
            --surface3: #2d281d;
            --border: rgba(180,150,80,0.12);
            --border2: rgba(180,150,80,0.25);
            --border3: rgba(180,150,80,0.45);
            --gold: #c9a84c;
            --gold2: #e8c870;
            --gold3: #f5dfa0;
            --gold-dim: rgba(201,168,76,0.15);
            --gold-glow: rgba(201,168,76,0.3);
            --text: #e8dfc8;
            --text2: #a8987a;
            --text3: #6a5e48;
            --danger: #c0392b;
            --danger2: #e74c3c;
            --danger-dim: rgba(192,57,43,0.15);
            --success: #27ae60;
            --success2: #2ecc71;
            --success-dim: rgba(39,174,96,0.12);

            --cat-player: #e74c3c;
            --cat-inv: #e67e22;
            --cat-rules: #9b59b6;
            --cat-health: #e91e8c;
            --cat-effects: #1abc9c;
            --cat-spawn: #e74c3c;
            --cat-settings: #3498db;
            --cat-other: #f1c40f;

            --font-display: 'Cinzel', serif;
            --font-ui: 'Barlow Condensed', sans-serif;
            --font-body: 'Barlow', sans-serif;
        }

        [data-theme="light"] {
            --bg: #f0ece0;
            --bg2: #e8e4d8;
            --bg3: #ddd8c8;
            --surface: #faf7ee;
            --surface2: #f5f0e0;
            --surface3: #eeeadb;
            --border: rgba(100,80,40,0.12);
            --border2: rgba(100,80,40,0.25);
            --border3: rgba(100,80,40,0.45);
            --gold: #8b6914;
            --gold2: #a07820;
            --gold3: #c09030;
            --gold-dim: rgba(139,105,20,0.1);
            --gold-glow: rgba(139,105,20,0.2);
            --text: #2c2410;
            --text2: #5a4c30;
            --text3: #9a8860;
            --danger: #a93226;
            --danger2: #c0392b;
            --danger-dim: rgba(169,50,38,0.1);
            --success: #1e8449;
            --success2: #27ae60;
            --success-dim: rgba(30,132,73,0.1);
        }

        [data-theme="void"] {
            --bg: #040408;
            --bg2: #07070f;
            --bg3: #0c0c18;
            --surface: #10101e;
            --surface2: #16162a;
            --surface3: #1e1e38;
            --border: rgba(100,140,255,0.1);
            --border2: rgba(100,140,255,0.22);
            --border3: rgba(100,140,255,0.4);
            --gold: #6688ee;
            --gold2: #8899ff;
            --gold3: #aabbff;
            --gold-dim: rgba(100,136,238,0.12);
            --gold-glow: rgba(100,136,238,0.25);
            --text: #c8d4f8;
            --text2: #7888b8;
            --text3: #445588;
            --danger: #cc3366;
            --danger2: #ff4488;
            --danger-dim: rgba(204,51,102,0.15);
            --success: #33bb88;
            --success2: #44ddaa;
            --success-dim: rgba(51,187,136,0.12);
        }

        [data-theme="blood"] {
            --bg: #0f0404;
            --bg2: #160606;
            --bg3: #1e0808;
            --surface: #230c0c;
            --surface2: #2d1010;
            --surface3: #381414;
            --border: rgba(220,60,60,0.12);
            --border2: rgba(220,60,60,0.25);
            --border3: rgba(220,60,60,0.45);
            --gold: #dd4444;
            --gold2: #ee6666;
            --gold3: #ffaaaa;
            --gold-dim: rgba(221,68,68,0.12);
            --gold-glow: rgba(221,68,68,0.3);
            --text: #f8d8d8;
            --text2: #c89090;
            --text3: #886060;
            --danger: #ff6600;
            --danger2: #ff8822;
            --danger-dim: rgba(255,102,0,0.15);
            --success: #44bb44;
            --success2: #66dd66;
            --success-dim: rgba(68,187,68,0.12);
        }

        [data-theme="ice"] {
            --bg: #04080f;
            --bg2: #07101a;
            --bg3: #0c1a28;
            --surface: #102030;
            --surface2: #162840;
            --surface3: #1e3450;
            --border: rgba(120,200,240,0.1);
            --border2: rgba(120,200,240,0.22);
            --border3: rgba(120,200,240,0.4);
            --gold: #60c8ee;
            --gold2: #88ddff;
            --gold3: #bbeeff;
            --gold-dim: rgba(96,200,238,0.1);
            --gold-glow: rgba(96,200,238,0.25);
            --text: #d0eef8;
            --text2: #7aaac8;
            --text3: #405878;
            --danger: #ee4466;
            --danger2: #ff6688;
            --danger-dim: rgba(238,68,102,0.15);
            --success: #44ddaa;
            --success2: #66ffcc;
            --success-dim: rgba(68,221,170,0.12);
        }

        [data-theme="forest"] {
            --bg: #050d06;
            --bg2: #09140a;
            --bg3: #0e1c10;
            --surface: #122416;
            --surface2: #182e1c;
            --surface3: #203824;
            --border: rgba(80,160,80,0.12);
            --border2: rgba(80,160,80,0.25);
            --border3: rgba(80,160,80,0.45);
            --gold: #5caa5c;
            --gold2: #78cc78;
            --gold3: #aaeeaa;
            --gold-dim: rgba(92,170,92,0.12);
            --gold-glow: rgba(92,170,92,0.25);
            --text: #d0f0d0;
            --text2: #80b880;
            --text3: #487048;
            --danger: #dd4422;
            --danger2: #ff6644;
            --danger-dim: rgba(221,68,34,0.15);
            --success: #88ccaa;
            --success2: #aaeedd;
            --success-dim: rgba(136,204,170,0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg);
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px);
            background-size: 40px 40px;
            color: var(--text);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            background: var(--bg2);
            border-bottom: 1px solid var(--border2);
            padding: 0 clamp(16px,3vw,32px);
            height: 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 40px rgba(0,0,0,0.6);
        }

        header::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--gold2), var(--gold), transparent);
            opacity: 0.6;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border3);
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(45deg);
            flex-shrink: 0;
            background: var(--gold-dim);
        }
        .logo-icon-inner {
            width: 12px;
            height: 12px;
            background: var(--gold);
            transform: rotate(0deg);
            box-shadow: 0 0 12px var(--gold-glow);
        }

        .logo-area h1 {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 700;
            color: var(--gold2);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--bg);
            border: 1px solid var(--border2);
            padding: 4px;
        }

        .tab-btn {
            font-family: var(--font-ui);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 8px 24px;
            background: transparent;
            border: none;
            color: var(--text3);
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
        }
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10px;
            right: 10px;
            height: 2px;
            background: var(--gold);
            transform: scaleX(0);
            transition: transform 0.2s;
        }
        .tab-btn:hover { color: var(--text2); }
        .tab-btn.active { color: var(--gold2); }
        .tab-btn.active::after { transform: scaleX(1); }

        .controls-area { display: flex; gap: 8px; align-items: center; }

        .hdr-select {
            background: var(--bg);
            color: var(--text2);
            border: 1px solid var(--border2);
            padding: 7px 28px 7px 12px;
            font-family: var(--font-ui);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            outline: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22 width%3D%228%22 height%3D%226%22%3E%3Cpath fill%3D%22%23a8987a%22 d%3D%22M0 0l4 6 4-6z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 10px center;
            transition: border-color 0.2s;
        }
        .hdr-select:hover { border-color: var(--border3); color: var(--text); }
        .hdr-select option { background: var(--bg2); }

        main { flex: 1; padding: clamp(16px,3vw,28px); width: 100%; max-width: 1700px; margin: 0 auto; }

        .section { display: none; opacity: 0; transform: translateY(10px); transition: opacity 0.3s, transform 0.3s; }
        .section.active { display: block; opacity: 1; transform: translateY(0); }

        .manual-layout { display: grid; grid-template-columns: 1fr 340px; gap: 24px; align-items: start; }
        .categories { column-count: 3; column-gap: 18px; }
        @media (max-width: 1300px) { .categories { column-count: 2; } }
        @media (max-width: 900px) { .categories { column-count: 1; } .manual-layout { grid-template-columns: 1fr; } .summary-panel { position: static; height: auto; } }

        .cat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            break-inside: avoid;
            margin-bottom: 18px;
            overflow: hidden;
        }

        .cat-card:hover { border-color: var(--border2); }

        .cat-head {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }
        .cat-diamond {
            width: 10px;
            height: 10px;
            transform: rotate(45deg);
            flex-shrink: 0;
        }
        .cat-name {
            font-family: var(--font-ui);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--text2);
        }

        .mod-item {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            gap: 12px;
            transition: background 0.15s;
            position: relative;
        }
        .mod-item:last-child { border-bottom: none; }
        .mod-item:hover { background: var(--surface2); }
        .mod-item.selected { background: var(--gold-dim); }
        .mod-item.selected::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--gold);
        }
        .mod-item.disabled { opacity: 0.3; pointer-events: none; }

        .mod-icon { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; }
        .mod-text { flex: 1; min-width: 0; }
        .mod-name { font-family: var(--font-ui); font-size: 13px; font-weight: 700; letter-spacing: 0.5px; color: var(--text); }
        .mod-desc { font-size: 11px; color: var(--text3); margin-top: 2px; line-height: 1.4; font-family: var(--font-body); font-weight: 400; }
        .mod-pct {
            font-family: var(--font-ui);
            font-size: 13px;
            font-weight: 700;
            color: var(--gold);
            flex-shrink: 0;
            min-width: 42px;
            text-align: right;
            letter-spacing: 0.5px;
        }

        .summary-panel {
            background: var(--surface);
            border: 1px solid var(--border2);
            position: sticky;
            top: 80px;
            height: calc(100vh - 100px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-section {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .panel-label {
            font-family: var(--font-ui);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-label::before, .panel-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border2);
        }

        .total-display {
            text-align: center;
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .total-num {
            font-family: var(--font-display);
            font-size: 56px;
            font-weight: 900;
            color: var(--gold2);
            line-height: 1;
        }
        .total-label {
            font-family: var(--font-ui);
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--text3);
            margin-top: 4px;
            text-transform: uppercase;
        }

        .preset-grid { display: flex; flex-direction: column; gap: 8px; }
        .preset-input {
            background: var(--bg);
            border: 1px solid var(--border2);
            color: var(--text);
            padding: 8px 12px;
            font-family: var(--font-ui);
            font-size: 12px;
            font-weight: 500;
            outline: none;
            width: 100%;
            transition: border-color 0.2s;
        }
        .preset-input:focus { border-color: var(--gold); }
        .preset-input::placeholder { color: var(--text3); }

        .btn-row { display: flex; gap: 6px; }
        .px-btn {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border2);
            color: var(--text2);
            padding: 8px 6px;
            font-family: var(--font-ui);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .px-btn:hover { background: var(--surface3); border-color: var(--border3); color: var(--text); }
        .px-btn.save { border-color: rgba(39,174,96,0.3); color: var(--success); }
        .px-btn.save:hover { background: var(--success-dim); border-color: var(--success2); }
        .px-btn.del { border-color: rgba(192,57,43,0.3); color: var(--danger); }
        .px-btn.del:hover { background: var(--danger-dim); border-color: var(--danger2); }
        .px-btn.dl { border-color: var(--border2); }

        .sel-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; min-height: 0; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border3); }
        ::-webkit-scrollbar-track { background: transparent; }

        .sel-item {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-left: 3px solid var(--item-color, var(--gold));
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .sel-item:hover { border-color: var(--border2); border-left-color: var(--item-color, var(--gold)); }
        .sel-item-info { flex: 1; min-width: 0; }
        .sel-item-name { font-family: var(--font-ui); font-size: 12px; font-weight: 700; letter-spacing: 0.5px; }
        .sel-item-desc { font-size: 10px; color: var(--text3); margin-top: 2px; font-family: var(--font-body); }
        .sel-item-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .sel-pct { font-family: var(--font-ui); font-size: 13px; font-weight: 800; color: var(--gold); }
        .del-btn {
            width: 22px; height: 22px;
            background: var(--danger-dim);
            border: 1px solid rgba(192,57,43,0.3);
            color: var(--danger2);
            cursor: pointer;
            font-size: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s;
        }
        .del-btn:hover { background: var(--danger); color: #fff; }

        .roulette-layout {
            display: grid;
            grid-template-columns: 300px 1fr 320px;
            gap: 20px;
            height: calc(100vh - 120px);
        }
        @media (max-width: 1100px) { .roulette-layout { grid-template-columns: 260px 1fr 260px; } }
        @media (max-width: 800px) { .roulette-layout { grid-template-columns: 1fr; height: auto; } }

        .side-panel {
            background: var(--surface);
            border: 1px solid var(--border2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
        }

        .side-panel-head {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface2);
            flex-shrink: 0;
        }
        .side-panel-title {
            font-family: var(--font-ui);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--gold);
        }

        .reset-btn {
            background: var(--danger-dim);
            border: 1px solid rgba(192,57,43,0.3);
            color: var(--danger2);
            padding: 5px 10px;
            font-family: var(--font-ui);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.15s;
        }
        .reset-btn:hover { background: var(--danger); color: #fff; }

        .pool-content { flex: 1; overflow-y: auto; padding: 8px; }

        .pool-cat { margin-bottom: 12px; }
        .pool-cat-name {
            font-family: var(--font-ui);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--cat-color, var(--text3));
            padding: 6px 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        .pool-cat-name::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            margin-bottom: 4px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .toggle-row:hover { background: var(--surface2); border-color: var(--border2); }
        .toggle-name {
            font-family: var(--font-ui);
            font-size: 12px;
            font-weight: 600;
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
        }
        .toggle-icon-sm { font-size: 14px; }

        .switch { position: relative; display: inline-block; width: 34px; height: 18px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: var(--surface3); }
        .slider::before { position: absolute; content: ''; height: 12px; width: 12px; left: 3px; bottom: 3px; background: var(--text3); transition: 0.25s; }
        input:checked + .slider { background: var(--gold-dim); border: 1px solid var(--gold); }
        input:checked + .slider::before { transform: translateX(16px); background: var(--gold); }

        .center-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            padding: 20px;
        }

        .spin-config {
            background: var(--surface);
            border: 1px solid var(--border2);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }
        .spin-config label {
            font-family: var(--font-ui);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text3);
        }
        .spin-config input {
            background: var(--bg);
            border: 1px solid var(--border2);
            color: var(--text);
            width: 70px;
            padding: 8px;
            text-align: center;
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 700;
            outline: none;
        }
        .spin-config input:focus { border-color: var(--gold); }

        .wheel-frame {
            position: relative;
            width: 480px;
            height: 480px;
            flex-shrink: 0;
        }
        @media (max-width: 1300px) { .wheel-frame { width: 380px; height: 380px; } }

        .wheel-outer {
            position: absolute;
            inset: 0;
            border: 2px solid var(--border3);
            border-radius: 50%;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.8), 0 0 40px rgba(0,0,0,0.6);
        }
        .wheel-corner {
            position: absolute;
            width: 16px;
            height: 16px;
            border: 2px solid var(--gold);
        }
        .wheel-corner.tl { top: 8px; left: 8px; border-right: none; border-bottom: none; }
        .wheel-corner.tr { top: 8px; right: 8px; border-left: none; border-bottom: none; }
        .wheel-corner.bl { bottom: 8px; left: 8px; border-right: none; border-top: none; }
        .wheel-corner.br { bottom: 8px; right: 8px; border-left: none; border-top: none; }

        .wheel-inner { width: 100%; height: 100%; border-radius: 50%; transition: transform cubic-bezier(0.1,0.9,0.2,1); will-change: transform; position: relative; z-index: 2; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; }

        .wheel-hub {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            z-index: 10;
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wheel-hub::before {
            content: '';
            position: absolute;
            width: 52px;
            height: 52px;
            border: 2px solid var(--gold);
            transform: rotate(45deg);
            background: var(--bg2);
        }
        .wheel-hub::after {
            content: '';
            width: 18px;
            height: 18px;
            background: var(--gold);
            transform: rotate(45deg);
            position: relative;
            z-index: 1;
        }

        .pointer-area {
            position: absolute;
            right: -12px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
        }
        .pointer-shape {
            width: 44px;
            height: 36px;
            background: var(--text);
            clip-path: polygon(100% 0, 0 50%, 100% 100%);
            box-shadow: -4px 0 16px rgba(0,0,0,0.8);
        }
        .pointer-shape::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            background: var(--gold);
            transform: translateY(-50%) rotate(45deg);
        }

        .spin-btn-wrap { margin-top: 32px; text-align: center; }
        .spin-btn {
            background: var(--bg2);
            border: 1px solid var(--gold);
            color: var(--gold2);
            padding: 16px 60px;
            font-family: var(--font-display);
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        .spin-btn::before, .spin-btn::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border: 1px solid var(--gold);
        }
        .spin-btn::before { top: -4px; left: -4px; border-right: none; border-bottom: none; }
        .spin-btn::after { bottom: -4px; right: -4px; border-left: none; border-top: none; }
        .spin-btn:hover { background: var(--gold-dim); box-shadow: 0 0 30px var(--gold-glow); color: var(--gold3); }
        .spin-btn:disabled { border-color: var(--border2); color: var(--text3); box-shadow: none; cursor: not-allowed; }
        .spin-btn:disabled:hover { background: var(--bg2); }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s, visibility 0.25s;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }

        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border2);
            max-width: 480px;
            width: 90%;
            padding: 0;
            position: relative;
            transform: translateY(20px) scale(0.97);
            transition: transform 0.25s;
            overflow: hidden;
        }
        .modal-overlay.show .modal-box { transform: translateY(0) scale(1); }

        .modal-stripe {
            height: 6px;
            background: var(--modal-color, var(--gold));
        }
        .modal-body { padding: 36px 40px 40px; text-align: center; }
        .modal-icon { font-size: 56px; margin-bottom: 16px; display: block; }
        .modal-name {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .modal-category {
            font-family: var(--font-ui);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--modal-color, var(--gold));
            margin-bottom: 16px;
        }
        .modal-desc {
            font-family: var(--font-body);
            font-size: 14px;
            color: var(--text2);
            line-height: 1.7;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
            margin-bottom: 28px;
        }
        .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .m-btn {
            padding: 14px 20px;
            font-family: var(--font-ui);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid;

        .m-btn.add { background: var(--success-dim); border-color: var(--success); color: var(--success2); }

        .m-btn.again { background: transparent; border-color: var(--border2); color: var(--text2); }
        .m-btn.again:hover { border-color: var(--gold); color: var(--gold2); }

        .corner-deco {
            position: absolute;

        let state = {
            lang:'ru', theme:'default',
            manualSelected: new Map(),
            wheelPool: new Set(),
            rolled: [],
            flatMods: new Map(),
            currentWinner: null,
            presets: {}
        };

        try {
            const t=localStorage.getItem('mod_theme'); if(t) state.theme=t;
            const l=localStorage.getItem('mod_lang'); if(l) state.lang=l;
            const p=localStorage.getItem('mod_presets'); if(p) state.presets=JSON.parse(p);
        } catch(e){}

        rawData.forEach(cat => cat.items.forEach(item => {
            state.flatMods.set(item.id, {...item, catKey:cat.key, catColor:cat.color, catHex:cat.hex});
            state.wheelPool.add(item.id);
        }));

        const canvasSize = 1000;
        const wheelCanvas = document.getElementById('wheel');
        const ctx = wheelCanvas.getContext('2d');
        wheelCanvas.width = canvasSize; wheelCanvas.height = canvasSize;
        const wheelInnerEl = document.getElementById('wheel-inner');
        const spinBtn = document.getElementById('spin-btn');
        const modal = document.getElementById('result-modal');
        let currentRotation = 0;

        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() {
            if(!audioCtx) audioCtx = new AudioCtx();
            if(audioCtx.state==='suspended') audioCtx.resume();
        }
        function playBeep(freq, dur, type='sine') {
            if(!audioCtx) return;
            const o=audioCtx.createOscillator(), g=audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            const now=audioCtx.currentTime;
            o.type=type; o.frequency.setValueAtTime(freq,now);
            g.gain.setValueAtTime(0.15,now); g.gain.exponentialRampToValueAtTime(0.001,now+dur);
            o.start(now); o.stop(now+dur);
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
                e.target.classList.add('active');
                document.getElementById(e.target.dataset.target).classList.add('active');
            });
        });

        document.getElementById('lang-select').addEventListener('change', e => {
            state.lang = e.target.value;
            try { localStorage.setItem('mod_lang', state.lang); } catch(e){}
            updateAllUI();
        });

        document.getElementById('theme-select').addEventListener('change', e => {
            state.theme = e.target.value;
            applyTheme();
            try { localStorage.setItem('mod_theme', state.theme); } catch(e){}
            setTimeout(drawWheel, 50);
        });

        function applyTheme() {
            const t = state.theme === 'default' ? '' : state.theme;
            document.body.setAttribute('data-theme', t || 'default');
        }

        document.getElementById('btn-reset-pool').addEventListener('click', () => {
            state.rolled = [];
            state.wheelPool.clear();
            state.flatMods.forEach((_,id) => state.wheelPool.add(id));
            renderRolledPanel(); renderPoolPanel(); drawWheel();
        });

        document.getElementById('btn-save-preset').addEventListener('click', () => {
            const ni = document.getElementById('preset-name');
            const si = document.getElementById('preset-select');
            let name = ni.value.trim() || si.value;
            if(!name) return;
            if(state.presets[name] && !confirm(i18n[state.lang].msgExists(name))) return;
            state.presets[name] = Array.from(state.manualSelected.keys());
            try { localStorage.setItem('mod_presets', JSON.stringify(state.presets)); } catch(e){}
            ni.value = '';
            renderPresets();
            document.getElementById('preset-select').value = name;
        });

        document.getElementById('btn-load-preset').addEventListener('click', () => {
            const name = document.getElementById('preset-select').value;
            if(!name || !state.presets[name]) return;
            state.manualSelected.clear();
            state.presets[name].forEach(id => {
                const m = state.flatMods.get(id);
                if(m) state.manualSelected.set(id, m);
            });
            document.querySelectorAll('.mod-item').forEach(el => el.classList.remove('selected'));
            state.manualSelected.forEach((_,id) => {
                document.querySelector(`.mod-item[data-id="${id}"]`)?.classList.add('selected');
            });
            initAudio(); playBeep(440, 0.1);
            updateManualSummary(); checkConflicts();
        });

        document.getElementById('btn-del-preset').addEventListener('click', () => {
            const name = document.getElementById('preset-select').value;
            if(!name || !state.presets[name]) return;
            if(!confirm(i18n[state.lang].msgDel(name))) return;
            delete state.presets[name];
            try { localStorage.setItem('mod_presets', JSON.stringify(state.presets)); } catch(e){}
            renderPresets();
        });

        function downloadTXT(source) {
            const items = source === 'manual' ? Array.from(state.manualSelected.values()) : state.rolled;
            if(!items.length) return;
            const t = i18n[state.lang];
            let total = items.reduce((s,i)=>s+i.pct,0);
            let text = `=== ${source==='manual'?t.tabManual:t.tInventory} (${total}%) ===\n\n`;
            let grouped = {};
            items.forEach(item => {
                if(!grouped[item.catKey]) grouped[item.catKey] = [];
                grouped[item.catKey].push(item);
            });
            for(let cat in grouped) {
                text += `[ ${t.cats[cat]} ]\n`;
                grouped[cat].forEach(item => {
                    text += `  ${item.icon} ${item[state.lang].n} (${item.pct}%) — ${item[state.lang].d}\n`;
                });
                text += '\n';
            }
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'}));
            a.download = `modifiers_${source}.txt`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        document.getElementById('btn-dl-txt').addEventListener('click', () => downloadTXT('manual'));
        document.getElementById('btn-dl-rolled').addEventListener('click', () => downloadTXT('rolled'));

        function renderPresets() {
            const sel = document.getElementById('preset-select');
            const cur = sel.value;
            sel.innerHTML = '';
            for(let name in state.presets) {
                const o = document.createElement('option');
                o.value = name; o.textContent = name;
                sel.appendChild(o);
            }
            if(state.presets[cur]) sel.value = cur;
            const has = Object.keys(state.presets).length > 0;
            sel.style.display = has ? 'block' : 'none';
            document.getElementById('btn-load-preset').style.display = has ? 'inline-flex' : 'none';
            document.getElementById('btn-del-preset').style.display = has ? 'inline-flex' : 'none';
        }

        function updateAllUI() {
            const t = i18n[state.lang];
            document.title = t.title;
            document.getElementById('app-title').textContent = t.title;
            document.getElementById('tab-manual').textContent = t.tabManual;
            document.getElementById('tab-roulette').textContent = t.tabRoulette;
            document.getElementById('t-pool').textContent = t.tPool;
            document.getElementById('t-inventory').textContent = t.tInventory;
            document.getElementById('t-time').textContent = t.tTime;
            spinBtn.textContent = t.spinBtn;
            document.getElementById('btn-action-add').textContent = t.btnActionAdd;
            document.getElementById('btn-spin-again').textContent = t.btnSpin;
            document.getElementById('t-btn-reset').textContent = t.btnReset;
            document.getElementById('t-btn-save').textContent = t.btnSave;
            document.getElementById('t-btn-load').textContent = t.btnLoad;
            document.getElementById('t-btn-del').textContent = t.btnDelete;
            document.getElementById('t-presets').textContent = t.tPresets;
            document.getElementById('t-total-label').textContent = t.tTotalLabel;
            document.getElementById('preset-name').placeholder = t.tPlaceholder;

            const thSel = document.getElementById('theme-select');
            ['default','light','void','blood','ice','forest'].forEach(k => {
                const opt = document.getElementById(`th-${k}`);
                if(opt) opt.textContent = t.themes[k];
            });

            applyTheme();
            document.getElementById('theme-select').value = state.theme;
            document.getElementById('lang-select').value = state.lang;

            renderPresets();
            renderManualTab();
            renderPoolPanel();
            renderRolledPanel();
            drawWheel();
        }

        function renderManualTab() {
            const cont = document.getElementById('manual-container');
            const t = i18n[state.lang];
            cont.innerHTML = '';
            rawData.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'cat-card';
                const head = document.createElement('div');
                head.className = 'cat-head';
                const dia = document.createElement('div');
                dia.className = 'cat-diamond';
                dia.style.background = cat.hex;
                dia.style.boxShadow = `0 0 8px ${cat.hex}60`;
                head.appendChild(dia);
                const nm = document.createElement('div');
                nm.className = 'cat-name';
                nm.textContent = t.cats[cat.key];
                head.appendChild(nm);
                card.appendChild(head);

                cat.items.forEach(item => {
                    const el = document.createElement('div');
                    el.className = `mod-item${state.manualSelected.has(item.id)?' selected':''}`;
                    el.dataset.id = item.id;
                    el.dataset.group = item.group || '';
                    const d = item[state.lang];
                    el.innerHTML = `<span class="mod-icon">${item.icon}</span><div class="mod-text"><div class="mod-name">${d.n}</div><div class="mod-desc">${d.d}</div></div><span class="mod-pct">${item.pct}%</span>`;
                    el.addEventListener('click', () => {
                        initAudio();
                        if(state.manualSelected.has(item.id)) {
                            state.manualSelected.delete(item.id);
                            el.classList.remove('selected');
                            playBeep(300, 0.06);
                        } else {
                            if(item.group) {
                                for(let [sid, sitem] of state.manualSelected) {
                                    if(sitem.group === item.group) {
                                        state.manualSelected.delete(sid);
                                        document.querySelector(`.mod-item[data-id="${sid}"]`)?.classList.remove('selected');
                                    }
                                }
                            }
                            state.manualSelected.set(item.id, state.flatMods.get(item.id));
                            el.classList.add('selected');
                            playBeep(600, 0.08);
                        }
                        updateManualSummary(); checkConflicts();
                    });
                    card.appendChild(el);
                });
                cont.appendChild(card);
            });
            updateManualSummary(); checkConflicts();
        }

        function checkConflicts() {
            const allEls = document.querySelectorAll('#manual-container .mod-item');
            allEls.forEach(el => el.classList.remove('disabled'));
            const activeGroups = new Set([...state.manualSelected.values()].map(i=>i.group).filter(Boolean));
            allEls.forEach(el => {
                if(el.dataset.group && activeGroups.has(el.dataset.group) && !el.classList.contains('selected')) {
                    el.classList.add('disabled');
                }
            });
        }

        function updateManualSummary() {
            const list = document.getElementById('manual-selected-list');
            list.innerHTML = '';
            let total = 0;
            for(let item of state.manualSelected.values()) {
                total += item.pct;
                const el = document.createElement('div');
                el.className = 'sel-item';
                el.style.setProperty('--item-color', item.catHex);
                const d = item[state.lang];
                el.innerHTML = `<div class="sel-item-info"><div class="sel-item-name">${item.icon} ${d.n}</div><div class="sel-item-desc">${d.d}</div></div><div class="sel-item-right"><div class="sel-pct">${item.pct<0?`+${-item.pct}%`:`${item.pct}%`}</div><button class="del-btn" data-id="${item.id}">✕</button></div>`;
                list.appendChild(el);
            }
            document.getElementById('total-pct').textContent = `${total}%`;
            document.querySelectorAll('.del-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    const id = e.currentTarget.dataset.id;
                    state.manualSelected.delete(id);
                    document.querySelector(`.mod-item[data-id="${id}"]`)?.classList.remove('selected');
                    initAudio(); playBeep(300, 0.06);
                    updateManualSummary(); checkConflicts();
                });
            });
        }

        function renderPoolPanel() {
            const t = i18n[state.lang];
            const cont = document.getElementById('pool-list');
            cont.innerHTML = '';
            rawData.forEach(cat => {
                const grp = document.createElement('div');
                grp.className = 'pool-cat';
                grp.style.setProperty('--cat-color', cat.hex);
                grp.innerHTML = `<div class="pool-cat-name">${t.cats[cat.key]}</div>`;
                cat.items.forEach(item => {
                    const row = document.createElement('label');
                    row.className = 'toggle-row';
                    row.innerHTML = `<span class="toggle-name"><span class="toggle-icon-sm">${item.icon}</span>${item[state.lang].n}</span><div class="switch"><input type="checkbox" data-id="${item.id}" class="pool-toggle"${state.wheelPool.has(item.id)?' checked':''}><span class="slider"></span></div>`;
                    grp.appendChild(row);
                });
                cont.appendChild(grp);
            });
            document.querySelectorAll('.pool-toggle').forEach(cb => {
                cb.addEventListener('change', e => {
                    const id = e.target.dataset.id;
                    if(e.target.checked) state.wheelPool.add(id); else state.wheelPool.delete(id);
                    drawWheel();
                });
            });
        }

        function renderRolledPanel() {
            const cont = document.getElementById('rolled-list');
            cont.innerHTML = '';
            if(!state.rolled.length) {
                cont.innerHTML = `<div style="text-align:center;color:var(--text3);font-family:var(--font-ui);font-size:11px;letter-spacing:2px;padding:30px 0;text-transform:uppercase;">Empty</div>`;
                return;
            }
            state.rolled.forEach((item, idx) => {
                const el = document.createElement('div');
                el.className = 'sel-item';
                el.style.setProperty('--item-color', item.catHex);
                const d = item[state.lang];
                el.innerHTML = `<div class="sel-item-info"><div class="sel-item-name">${item.icon} ${d.n}</div><div class="sel-item-desc">${d.d}</div></div><div class="sel-item-right"><div class="sel-pct">${item.pct}%</div><button class="del-btn" data-index="${idx}">✕</button></div>`;
                cont.appendChild(el);
            });
            document.querySelectorAll('.del-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    state.rolled.splice(e.currentTarget.dataset.index, 1);
                    renderRolledPanel();
                });
            });
        }

        function drawWheel() {
            const cx = canvasSize/2, cy = canvasSize/2, r = canvasSize/2 - 8;
            ctx.clearRect(0,0,canvasSize,canvasSize);
            const pool = Array.from(state.wheelPool).map(id => state.flatMods.get(id));
            const bgc = getComputedStyle(document.body).getPropertyValue('--bg').trim() || '#0e0c09';
            if(!pool.length) {
                ctx.fillStyle = bgc; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
                spinBtn.disabled = true; return;
            }
            spinBtn.disabled = false;
            const slice = (2*Math.PI) / pool.length;
            for(let i=0; i<pool.length; i++) {
                const mod = pool[i];
                const start = i*slice, end = start+slice;
                ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,end);
                ctx.fillStyle = mod.catHex; ctx.fill();
                ctx.lineWidth = 3; ctx.strokeStyle = bgc; ctx.stroke();
                ctx.save();
                ctx.translate(cx,cy); ctx.rotate(start+slice/2);
                ctx.textAlign='right'; ctx.textBaseline='middle';
                ctx.fillStyle='rgba(255,255,255,0.9)';
                ctx.font='bold 16px "Barlow Condensed", sans-serif';
                ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=6;
                ctx.fillText(mod[state.lang].n, r-36, 0, r-80);
                ctx.restore();
            }
            ctx.beginPath(); ctx.arc(cx,cy,30,0,Math.PI*2);
            ctx.fillStyle = bgc; ctx.fill();
            ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--gold').trim() || '#c9a84c';
            ctx.lineWidth = 2; ctx.stroke();
        }

        spinBtn.addEventListener('click', () => {
            if(!state.wheelPool.size) return;
            initAudio(); playBeep(220, 0.4, 'sawtooth');
            spinBtn.disabled = true;
            const sec = Math.max(1, Math.min(20, parseFloat(document.getElementById('spin-time-input').value) || 5));
            currentRotation += (Math.floor(Math.random()*5)+5)*360 + Math.floor(Math.random()*360);
            wheelInnerEl.style.transition = `transform ${sec}s cubic-bezier(0.1,0.9,0.2,1)`;
            wheelInnerEl.style.transform = `rotate(${currentRotation}deg)`;
            setTimeout(finishSpin, sec*1000);
        });

        function finishSpin() {
            spinBtn.disabled = false;
            const pool = Array.from(state.wheelPool).map(id => state.flatMods.get(id));
            const sliceDeg = 360 / pool.length;
            const norm = currentRotation % 360;
            const winAngle = (360-norm)%360;
            const idx = Math.floor(winAngle/sliceDeg) % pool.length;
            state.currentWinner = pool[idx];
            initAudio(); playBeep(880, 0.3);
            showModal();
        }

        function showModal() {
            const mod = state.currentWinner;
            const t = i18n[state.lang];
            document.getElementById('res-icon').textContent = mod.icon;
            document.getElementById('res-name').textContent = mod[state.lang].n;
            document.getElementById('res-cat').textContent = t.cats[mod.catKey];
            document.getElementById('res-desc').textContent = mod[state.lang].d;
            document.getElementById('modal-content').style.setProperty('--modal-color', mod.catHex);
            document.querySelector('.modal-stripe').style.background = mod.catHex;
            document.getElementById('btn-action-add').textContent = t.btnActionAdd;
            document.getElementById('btn-spin-again').textContent = t.btnSpin;
            modal.classList.add('show');
        }

        document.getElementById('btn-action-add').addEventListener('click', () => {
            state.rolled.push(state.currentWinner);
            state.wheelPool.delete(state.currentWinner.id);
            if(state.currentWinner.group) {
                for(let id of state.wheelPool) {
                    const m = state.flatMods.get(id);
                    if(m && m.group === state.currentWinner.group) state.wheelPool.delete(id);
                }
            }
            renderRolledPanel(); renderPoolPanel(); drawWheel();
            modal.classList.remove('show');
        });

        document.getElementById('btn-spin-again').addEventListener('click', () => {
            modal.classList.remove('show');
            setTimeout(() => spinBtn.click(), 300);
        });

        modal.addEventListener('click', e => {
            if(e.target === modal) modal.classList.remove('show');
        });

        updateAllUI();
    </script>
</body>
</html>
