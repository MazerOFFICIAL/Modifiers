<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifiers</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root, [data-theme="cyberpunk"] {
            --bg-color: #0a0a0c;
            --surface: rgba(20, 20, 25, 0.7);
            --surface-hover: rgba(35, 35, 45, 0.9);
            --border: rgba(255, 255, 255, 0.08);
            --border-active: rgba(0, 240, 255, 0.3);
            --text-main: #ffffff;
            --text-muted: #8a8a93;
            --accent: #00f0ff;
            --accent-glow: rgba(0, 240, 255, 0.4);
            --danger: #ff0055;
            --success: #00ff88;
            --grad-bg: radial-gradient(circle at 15% 50%, rgba(255, 71, 87, 0.05), transparent 25%), radial-gradient(circle at 85% 30%, rgba(0, 240, 255, 0.05), transparent 25%);
        }

        [data-theme="light"] {
            --bg-color: #f4f6f8;
            --surface: rgba(255, 255, 255, 0.8);
            --surface-hover: rgba(255, 255, 255, 1);
            --border: rgba(0, 0, 0, 0.08);
            --border-active: rgba(37, 99, 235, 0.3);
            --text-main: #111827;
            --text-muted: #6b7280;
            --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.3);
            --danger: #ef4444;
            --success: #10b981;
            --grad-bg: radial-gradient(circle at 15% 50%, rgba(37, 99, 235, 0.03), transparent 25%), radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.03), transparent 25%);
        }

        [data-theme="midnight"] {
            --bg-color: #0d0914;
            --surface: rgba(25, 20, 40, 0.7);
            --surface-hover: rgba(40, 30, 65, 0.9);
            --border: rgba(255, 255, 255, 0.05);
            --border-active: rgba(168, 85, 247, 0.4);
            --text-main: #f3e8ff;
            --text-muted: #a8a2b5;
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.4);
            --danger: #f43f5e;
            --success: #2dd4bf;
            --grad-bg: radial-gradient(circle at 15% 50%, rgba(168, 85, 247, 0.08), transparent 30%), radial-gradient(circle at 85% 30%, rgba(45, 212, 191, 0.05), transparent 25%);
        }

        [data-theme="forest"] {
            --bg-color: #0b120c;
            --surface: rgba(20, 30, 22, 0.7);
            --surface-hover: rgba(32, 48, 35, 0.9);
            --border: rgba(255, 255, 255, 0.05);
            --border-active: rgba(16, 185, 129, 0.4);
            --text-main: #ecfdf5;
            --text-muted: #9ca3af;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.3);
            --danger: #ef4444;
            --success: #34d399;
            --grad-bg: radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.05), transparent 30%), radial-gradient(circle at 85% 30%, rgba(234, 179, 8, 0.03), transparent 25%);
        }

        [data-theme="bloodmoon"] {
            --bg-color: #140505;
            --surface: rgba(35, 10, 10, 0.7);
            --surface-hover: rgba(55, 15, 15, 0.9);
            --border: rgba(255, 255, 255, 0.05);
            --border-active: rgba(239, 68, 68, 0.4);
            --text-main: #fef2f2;
            --text-muted: #b99a9a;
            --accent: #ef4444;
            --accent-glow: rgba(239, 68, 68, 0.4);
            --danger: #f97316;
            --success: #10b981;
            --grad-bg: radial-gradient(circle at 50% 0%, rgba(239, 68, 68, 0.08), transparent 40%);
        }

        :root {
            --cat-player: #ff4757;
            --cat-inventory: #ffa502;
            --cat-rules: #9b59b6;
            --cat-effects: #2ed573;
            --cat-spawn: #ff6348;
            --cat-settings: #1e90ff;
            --cat-other: #eccc68;
            --font-main: 'Montserrat', sans-serif;
            --wheel-size: 500px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); user-select: none; transition: background-color 0.3s, border-color 0.3s, color 0.3s, box-shadow 0.3s; }

        body {
            background-color: var(--bg-color);
            background-image: var(--grad-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
        }

        .logo-area h1 { font-weight: 900; font-size: 22px; text-transform: uppercase; background: linear-gradient(45deg, var(--text-main), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1.5px; }
        
        .controls-area { display: flex; gap: 12px; align-items: center; }
        
        .theme-select {
            background: var(--surface-hover);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 30px 8px 15px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%238a8a93%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 10px top 50%;
            background-size: 10px auto;
            outline: none;
        }
        .theme-select:hover { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        .theme-select option { background: var(--bg-color); color: var(--text-main); }

        .icon-btn { background: var(--surface-hover); border: 1px solid var(--border); color: var(--text-main); width: 38px; height: 38px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .icon-btn:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 0 10px var(--accent-glow); }

        .tabs { display: flex; background: rgba(0,0,0,0.15); padding: 5px; border-radius: 14px; border: 1px solid var(--border); }
        [data-theme="light"] .tabs { background: rgba(0,0,0,0.05); }
        .tab-btn { background: transparent; border: none; color: var(--text-muted); padding: 8px 24px; border-radius: 10px; cursor: pointer; font-weight: 800; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .tab-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent-glow); }

        main { flex: 1; padding: 30px; width: 100%; max-width: 1600px; margin: 0 auto; display: flex; flex-direction: column; }
        .section { display: none; opacity: 0; transform: translateY(15px); transition: opacity 0.4s, transform 0.4s; flex: 1; }
        .section.active { display: block; opacity: 1; transform: translateY(0); }

        .manual-layout { display: grid; grid-template-columns: 1fr 350px; gap: 30px; align-items: start; height: 100%; }
        
        .categories { column-count: 3; column-gap: 20px; width: 100%; }
        @media (max-width: 1200px) { .categories { column-count: 2; } }
        @media (max-width: 800px) { .categories { column-count: 1; } }

        .category-card { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 20px; 
            backdrop-filter: blur(10px); display: flex; flex-direction: column; gap: 10px; 
            break-inside: avoid; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .category-card:hover { border-color: var(--border-active); transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0,0,0,0.2); }
        
        .category-title { font-size: 14px; font-weight: 900; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-main); }
        .category-title::before { content: ''; display: block; width: 12px; height: 12px; border-radius: 4px; background-color: var(--cat-color); box-shadow: 0 0 12px var(--cat-color); transform: rotate(45deg); }

        .modifier-item { display: flex; align-items: center; justify-content: space-between; background: var(--bg-color); padding: 12px 16px; border-radius: 12px; cursor: pointer; border: 1px solid var(--border); }
        .modifier-item:hover { background: var(--surface-hover); transform: translateX(5px); border-color: var(--border-active); }
        .modifier-item.selected { border-color: var(--cat-color); background: linear-gradient(90deg, rgba(255,255,255,0.03), transparent); box-shadow: inset 4px 0 0 var(--cat-color); }
        .modifier-item.disabled { opacity: 0.35; filter: grayscale(1); }

        .mod-info { display: flex; align-items: center; gap: 14px; flex: 1; }
        .mod-icon { font-size: 24px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
        .mod-name { font-weight: 800; font-size: 13px; color: var(--text-main); }
        .mod-desc { font-size: 11px; color: var(--text-muted); display: block; margin-top: 4px; line-height: 1.4; font-weight: 600; }
        .mod-pct { background: var(--surface); padding: 6px 10px; border-radius: 8px; font-size: 12px; font-weight: 900; border: 1px solid var(--border); color: var(--accent); }

        .summary-panel, .side-panel { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 25px; 
            backdrop-filter: blur(20px); box-shadow: 0 15px 40px rgba(0,0,0,0.15); display: flex; flex-direction: column; 
        }
        .summary-panel { position: sticky; top: 100px; height: calc(100vh - 120px); overflow: hidden; }
        .side-panel { height: 100%; overflow: hidden; }
        
        .presets-container { margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 20px; flex-shrink: 0; }
        .presets-header { font-size: 12px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0; letter-spacing: 1px; }
        .presets-inputs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
        .presets-input { background: var(--bg-color); border: 1px solid var(--border); color: var(--text-main); border-radius: 10px; padding: 10px 12px; font-size: 12px; font-weight: 600; outline: none; transition: 0.2s; width: 100%; }
        .presets-input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 240, 255, 0.1); }
        .presets-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        
        .btn-preset { background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--border); border-radius: 10px; padding: 10px; font-size: 11px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-preset:hover { background: var(--surface-hover); border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
        .btn-preset.save { color: var(--success); border-color: rgba(0,255,136,0.3); }
        .btn-preset.save:hover { background: rgba(0,255,136,0.1); border-color: var(--success); box-shadow: 0 0 10px rgba(0,255,136,0.2); }
        .btn-preset.danger { color: var(--danger); border-color: rgba(255,0,85,0.3); }
        .btn-preset.danger:hover { background: rgba(255,0,85,0.1); border-color: var(--danger); box-shadow: 0 0 10px rgba(255,0,85,0.2); }

        .total-pct { font-size: 58px; font-weight: 900; margin-bottom: 15px; text-align: center; color: var(--accent); text-shadow: 0 0 30px var(--accent-glow); line-height: 1; flex-shrink: 0; }
        
        .selected-list, .panel-content { overflow-y: auto; padding-right: 8px; flex: 1; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        
        .selected-item { padding: 14px; border-radius: 14px; background: var(--bg-color); border: 1px solid var(--border); border-left: 4px solid var(--cat-color); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .selected-item:hover { border-color: var(--border-active); }
        .selected-item-info { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .selected-item-name { font-size: 13px; font-weight: 800; }
        .selected-item-desc { font-size: 11px; color: var(--text-muted); font-weight: 600; }
        .selected-item-pct { font-weight: 900; font-size: 14px; color: var(--accent); }

        .manual-item-del, .rolled-item-del { background: rgba(255,0,85,0.1); border: 1px solid var(--danger); border-radius: 8px; color: var(--danger); cursor: pointer; font-size: 14px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; margin-left: 12px; }
        .manual-item-del:hover, .rolled-item-del:hover { background: var(--danger); color: #fff; transform: scale(1.1); box-shadow: 0 0 15px rgba(255,0,85,0.4); }

        .roulette-layout { display: grid; grid-template-columns: 320px 1fr 340px; gap: 30px; height: calc(100vh - 140px); }
        
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-shrink: 0; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .panel-header h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-main); margin: 0; font-weight: 900; }
        
        .btn-reset { background: rgba(255,0,85,0.1); color: var(--danger); border: 1px solid var(--danger); border-radius: 10px; padding: 8px 16px; font-size: 11px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-reset:hover { background: var(--danger); color: #fff; box-shadow: 0 0 15px rgba(255,0,85,0.4); transform: translateY(-2px); }

        .pool-cat-group { margin-bottom: 15px; flex-shrink: 0; }
        .pool-cat-title { font-size: 12px; font-weight: 800; color: var(--cat-color); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--bg-color); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; cursor: pointer; }
        .toggle-row:hover { border-color: var(--border-active); }
        .toggle-name { font-size: 12px; font-weight: 700; flex: 1; display: flex; align-items: center; gap: 8px; color: var(--text-main); }
        
        .switch { position: relative; display: inline-block; width: 38px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border-active); border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        input:checked + .slider { background-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        input:checked + .slider:before { transform: translateX(16px); }

        .center-stage { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        .spin-input-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 15px 25px; display: inline-flex; align-items: center; gap: 15px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .spin-input-wrapper label { font-size: 13px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .spin-input-wrapper input { background: var(--bg-color); border: 1px solid var(--border-active); color: var(--text-main); width: 80px; padding: 10px; border-radius: 10px; text-align: center; font-weight: 900; font-size: 16px; outline: none; transition: 0.2s; }
        .spin-input-wrapper input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        
        .wheel-wrapper { position: relative; width: var(--wheel-size); height: var(--wheel-size); border-radius: 50%; background: var(--bg-color); box-shadow: 0 0 0 12px var(--surface), 0 30px 60px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .wheel-inner { width: 100%; height: 100%; border-radius: 50%; transform-origin: center; transition: transform cubic-bezier(0.1, 0.9, 0.2, 1); will-change: transform; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; }
        
        .wheel-center { position: absolute; width: 60px; height: 60px; background: var(--surface); border-radius: 50%; z-index: 10; border: 4px solid var(--accent); box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }
        .wheel-center::after { content: ''; width: 20px; height: 20px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 15px var(--accent-glow); }

        .pointer-wrapper { position: absolute; top: 50%; right: -25px; transform: translateY(-50%); z-index: 20; filter: drop-shadow(-5px 0 15px rgba(0,0,0,0.5)); }
        .pointer { width: 50px; height: 40px; background: var(--text-main); clip-path: polygon(100% 0, 0 50%, 100% 100%); }

        .spin-btn { margin-top: 50px; background: var(--accent); color: #000; border: none; padding: 20px 70px; font-size: 18px; font-weight: 900; border-radius: 100px; cursor: pointer; text-transform: uppercase; box-shadow: 0 10px 30px var(--accent-glow); letter-spacing: 2px; }
        .spin-btn:hover { transform: scale(1.05); box-shadow: 0 15px 40px var(--accent-glow); }
        .spin-btn:disabled { background: var(--surface-hover); color: var(--text-muted); box-shadow: none; cursor: not-allowed; transform: none; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 50px; text-align: center; max-width: 500px; width: 90%; transform: scale(0.9) translateY(20px); position: relative; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.5); }
        .modal-overlay.show .modal { transform: scale(1) translateY(0); }
        .modal::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 8px; background: var(--modal-color, var(--accent)); }
        
        .modal-name { font-size: 30px; font-weight: 900; margin-top: 15px; margin-bottom: 5px; color: var(--text-main); }
        .modal-chance { font-size: 16px; font-weight: 800; color: var(--accent); margin-bottom: 15px; display: inline-block; background: var(--bg-color); padding: 6px 16px; border-radius: 12px; border: 1px solid var(--border); }
        .modal-cat { font-size: 14px; font-weight: 800; color: var(--modal-color); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1.5px; }
        .modal-desc { font-size: 15px; color: var(--text-muted); margin-bottom: 10px; font-weight: 600; line-height: 1.6; }
        
        .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
        .m-btn { padding: 16px 20px; border-radius: 14px; font-weight: 800; cursor: pointer; border: none; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-add { background: var(--success); color: #000; box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3); }
        .btn-add:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0, 255, 136, 0.5); }
        .btn-spin { background: var(--surface-hover); color: var(--text-main); border: 1px solid var(--border-active); }
        .btn-spin:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 25px var(--accent-glow); }

        @media (max-width: 1400px) {
            .roulette-layout { grid-template-columns: 280px 1fr 280px; }
            :root { --wheel-size: 400px; }
        }
        @media (max-width: 900px) {
            .roulette-layout { grid-template-columns: 1fr; height: auto; }
            .side-panel { height: 450px; }
            .manual-layout { grid-template-columns: 1fr; }
            .summary-panel { position: static; height: auto; min-height: 500px; }
            .modal-actions { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area"><h1 id="app-title">Modifiers</h1></div>
        <div class="tabs" id="nav-tabs">
            <button class="tab-btn active" data-target="manual" id="tab-manual">Manual</button>
            <button class="tab-btn" data-target="roulette" id="tab-roulette">Roulette</button>
        </div>
        <div class="controls-area">
            <select class="theme-select" id="theme-select">
                <option value="cyberpunk" id="th-cyber">Cyberpunk</option>
                <option value="light" id="th-light">Light Mode</option>
                <option value="midnight" id="th-mid">Midnight</option>
                <option value="forest" id="th-forest">Forest</option>
                <option value="bloodmoon" id="th-blood">Blood Moon</option>
            </select>
            <button class="icon-btn" id="lang-toggle">🌐</button>
        </div>
    </header>

    <main>
        <section id="manual" class="section active">
            <div class="manual-layout">
                <div class="categories" id="manual-container"></div>
                <aside class="summary-panel">
                    <div class="presets-container">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                            <div class="presets-header" id="t-presets" style="margin: 0;">Presets</div>
                            <button class="btn-preset" id="btn-download-txt-manual" style="padding: 6px 12px; font-size: 10px;">⬇ TXT</button>
                        </div>
                        <div class="presets-inputs">
                            <input type="text" id="preset-name" class="presets-input" placeholder="Name to save...">

            presets: {}
        };

        try {
            const savedTheme = localStorage.getItem('modifiers_theme');
            if (savedTheme) state.theme = savedTheme;
            const savedLang = localStorage.getItem('modifiers_lang');
            if (savedLang) state.lang = savedLang;
            const savedPresets = localStorage.getItem('modifiers_presets');
            if (savedPresets) state.presets = JSON.parse(savedPresets);
        } catch(e) {}

        rawData.forEach(cat => {
            cat.items.forEach(item => {
                const fullItem = { ...item, catKey: cat.key, catColor: cat.color, catHex: cat.hex };
                state.flatMods.set(item.id, fullItem);
                state.wheelPool.add(item.id);
            });
        });

        const els = {
            manualCont: document.getElementById('manual-container'),
            poolList: document.getElementById('pool-list'),
            rolledList: document.getElementById('rolled-list'),
            manualSelected: document.getElementById('manual-selected-list'),
            spinBtn: document.getElementById('spin-btn'),
            wheelInner: document.getElementById('wheel-inner'),
            canvas: document.getElementById('wheel'),
            ctx: document.getElementById('wheel').getContext('2d'),
            modal: document.getElementById('result-modal'),
            timeInput: document.getElementById('spin-time-input'),
            btnResetPool: document.getElementById('btn-reset-pool'),
            themeSelect: document.getElementById('theme-select')
        };
        const size = 1000;
        els.canvas.width = size; els.canvas.height = size;

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'select') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.05);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            } else if (type === 'deselect') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.05);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            }
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                e.target.classList.add('active');
                document.getElementById(e.target.dataset.target).classList.add('active');
            });
        });

        document.getElementById('lang-toggle').addEventListener('click', () => { 
            state.lang = state.lang === 'ru' ? 'en' : 'ru'; 
            try { localStorage.setItem('modifiers_lang', state.lang); } catch(e){}
            updateAllUI(); 
        });

        els.themeSelect.addEventListener('change', (e) => {
            state.theme = e.target.value;
            document.body.setAttribute('data-theme', state.theme);
            try { localStorage.setItem('modifiers_theme', state.theme); } catch(e){}
            setTimeout(drawWheel, 50);
        });

        els.btnResetPool.addEventListener('click', () => {
            state.rolled = [];
            state.wheelPool.clear();
            state.flatMods.forEach((_, id) => state.wheelPool.add(id));
            renderRolledTab();
            renderPoolTab();
            drawWheel();
        });

        document.getElementById('btn-save-preset').addEventListener('click', () => {
            const nameInput = document.getElementById('preset-name');
            const select = document.getElementById('preset-select');
            let name = nameInput.value.trim();
            
            if (!name && select.value) {
                name = select.value;
            }
            
            if (!name) return;

            if (state.presets[name]) {
                const msg = state.lang === 'ru' ? `Пресет "${name}" уже существует. Перезаписать?` : `Preset "${name}" already exists. Overwrite?`;
                if (!confirm(msg)) return;
            }

            const ids = Array.from(state.manualSelected.keys());
            state.presets[name] = ids;
            try { localStorage.setItem('modifiers_presets', JSON.stringify(state.presets)); } catch(e){}
            
            nameInput.value = '';
            renderPresets();
            document.getElementById('preset-select').value = name;
        });

        document.getElementById('preset-select').addEventListener('change', () => {
            document.getElementById('preset-name').value = '';
        });

        document.getElementById('btn-load-preset').addEventListener('click', () => {
            const select = document.getElementById('preset-select');
            const name = select.value;
            if (!name || !state.presets[name]) return;
            
            state.manualSelected.clear();
            state.presets[name].forEach(id => {
                const mod = state.flatMods.get(id);
                if (mod) state.manualSelected.set(id, mod);
            });
            
            document.querySelectorAll('.modifier-item').forEach(el => el.classList.remove('selected'));
            state.manualSelected.forEach((_, id) => {
                document.querySelector(`.modifier-item[data-id="${id}"]`)?.classList.add('selected');
            });
            
            playSound('select');
            updateManualSummary();
            checkManualConflicts();
            document.getElementById('preset-name').value = '';
        });

        document.getElementById('btn-del-preset').addEventListener('click', () => {
            const select = document.getElementById('preset-select');
            const name = select.value;
            if (!name || !state.presets[name]) return;
            
            const msg = state.lang === 'ru' ? `Удалить пресет "${name}"?` : `Delete preset "${name}"?`;
            if (!confirm(msg)) return;

            delete state.presets[name];
            try { localStorage.setItem('modifiers_presets', JSON.stringify(state.presets)); } catch(e){}
            
            document.getElementById('preset-name').value = '';
            renderPresets();
        });

        function downloadTXT(source) {
            const items = source === 'manual' ? Array.from(state.manualSelected.values()) : state.rolled;
            if (items.length === 0) return;
            
            let total = items.reduce((sum, item) => sum + item.pct, 0);
            let t = i18n[state.lang];
            let text = `🎮 ${source === 'manual' ? t.title : t.tInventory} (Total: ${total}%)\n\n`;
            
            let grouped = {};
            items.forEach(item => {
                if(!grouped[item.catKey]) grouped[item.catKey] = [];
                grouped[item.catKey].push(item);
            });
            
            for (let cat in grouped) {
                text += `[ ${t.cats[cat]} ]\n`;
                grouped[cat].forEach(item => {
                    text += `- ${item.icon} ${item[state.lang].n} (${item.pct}%) | ${item[state.lang].d}\n`;
                });
                text += `\n`;
            }
            
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `modifiers_${source}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        document.getElementById('btn-download-txt-manual').addEventListener('click', () => downloadTXT('manual'));
        document.getElementById('btn-download-txt-rolled').addEventListener('click', () => downloadTXT('rolled'));

        function renderPresets() {
            const select = document.getElementById('preset-select');
            const currentVal = select.value;
            const t = i18n[state.lang];
            select.innerHTML = `<option value="">-- ${t.tSelectPreset} --</option>`;
            for (let name in state.presets) {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                select.appendChild(opt);
            }
            if (state.presets[currentVal]) {
                select.value = currentVal;
            }
        }

            const t = i18n[state.lang];

            document.getElementById('app-title').textContent = t.title;
            document.getElementById('tab-manual').textContent = t.tabManual;

            document.getElementById('t-pool').textContent = t.tPool;
            document.getElementById('t-inventory').textContent = t.tInventory;
            document.getElementById('t-time').textContent = t.tTime;
            els.spinBtn.textContent = t.spinBtn;
            document.getElementById('btn-action-add').textContent = t.btnActionAdd;
            document.getElementById('btn-spin-again').textContent = t.btnSpin;
            
            document.getElementById('t-btn-reset').textContent = t.btnReset;
            document.getElementById('t-btn-save').textContent = t.btnSave;
            document.getElementById('t-btn-load').textContent = t.btnLoad;
            document.getElementById('t-btn-del').textContent = t.btnDelete;
            
            document.getElementById('t-presets').textContent = t.tPresets;
            
            document.getElementById('btn-save-preset').title = t.titleSave;
            document.getElementById('btn-load-preset').title = t.titleLoad;
            document.getElementById('btn-del-preset').title = t.titleDelete;
            document.getElementById('preset-name').placeholder = t.tPlaceholder;
            
            document.getElementById('btn-download-txt-manual').title = t.titleDownloadTxt;
            document.getElementById('btn-download-txt-rolled').title = t.titleDownloadTxt;

            document.getElementById('th-cyber').textContent = t.themes.cyber;
            document.getElementById('th-light').textContent = t.themes.light;
            document.getElementById('th-mid').textContent = t.themes.mid;
            document.getElementById('th-forest').textContent = t.themes.forest;
            document.getElementById('th-blood').textContent = t.themes.blood;

            document.body.setAttribute('data-theme', state.theme);
            els.themeSelect.value = state.theme;

            renderPresets();
            renderManualTab();
            renderPoolTab();
            renderRolledTab();
            drawWheel();
        }

        function renderManualTab() {
            const t = i18n[state.lang];
            els.manualCont.innerHTML = '';
            
            rawData.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'category-card';
                card.style.setProperty('--cat-color', cat.color);
                card.innerHTML = `<div class="category-title">${t.cats[cat.key]}</div>`;

                cat.items.forEach(item => {
                    const el = document.createElement('div');
                    el.className = `modifier-item ${state.manualSelected.has(item.id) ? 'selected' : ''}`;
                    el.dataset.id = item.id;
                    el.dataset.group = item.group || '';
                    
                    const d = item[state.lang];
                    el.innerHTML = `
                        <div class="mod-info">
                            <span class="mod-icon">${item.icon}</span>
                            <div>
                                <div class="mod-name">${d.n}</div>
                                <span class="mod-desc">${d.d}</span>
                            </div>
                        </div>
                        <span class="mod-pct">${item.pct}%</span>
                    `;
                    
                    el.addEventListener('click', () => {
                        initAudio();
                        if(state.manualSelected.has(item.id)) { 
                            state.manualSelected.delete(item.id); 
                            el.classList.remove('selected'); 
                            playSound('deselect');
                        } else {
                            if(item.group) {
                                for(let [sid, sitem] of state.manualSelected) {
                                    if(sitem.group === item.group) { 
                                        state.manualSelected.delete(sid); 
                                        document.querySelector(`.modifier-item[data-id="${sid}"]`)?.classList.remove('selected'); 
                                    }
                                }
                            }
                            state.manualSelected.set(item.id, state.flatMods.get(item.id));
                            el.classList.add('selected');
                            playSound('select');
                        }
                        updateManualSummary();
                        checkManualConflicts();
                    });
                    card.appendChild(el);
                });
                els.manualCont.appendChild(card);
            });
            updateManualSummary();
            checkManualConflicts();
        }

        function checkManualConflicts() {
            const allEls = document.querySelectorAll('#manual-container .modifier-item');
            allEls.forEach(el => el.classList.remove('disabled'));
            const activeGroups = new Set([...state.manualSelected.values()].map(i => i.group).filter(g=>g));
            allEls.forEach(el => {
                if(el.dataset.group && activeGroups.has(el.dataset.group) && !el.classList.contains('selected')) {
                    el.classList.add('disabled');
                }
            });
        }

        function updateManualSummary() {
            let total = 0; els.manualSelected.innerHTML = '';
            for(let item of state.manualSelected.values()) {
                total += item.pct;
                const d = item[state.lang];
                
                const el = document.createElement('div');
                el.className = 'selected-item';
                el.style.setProperty('--cat-color', item.catColor);
                
                el.innerHTML = `
                    <div class="selected-item-info">
                        <div class="selected-item-name">${item.icon} ${d.n}</div>
                        <div class="selected-item-desc">${d.d}</div>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <div class="selected-item-pct">${item.pct}%</div>
                        <button class="manual-item-del" data-id="${item.id}">✖</button>
                    </div>
                `;
                els.manualSelected.appendChild(el);
            }
            document.getElementById('total-pct').textContent = `${total}%`;

            document.querySelectorAll('.manual-item-del').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.dataset.id;
                    state.manualSelected.delete(id);
                    document.querySelector(`.modifier-item[data-id="${id}"]`)?.classList.remove('selected');
                    playSound('deselect');
                    updateManualSummary();
                    checkManualConflicts();
                });
            });
        }

        function renderPoolTab() {
            const t = i18n[state.lang];
            els.poolList.innerHTML = '';
            
            rawData.forEach(cat => {
                let html = `<div class="pool-cat-group"><div class="pool-cat-title" style="--cat-color:${cat.color}">${t.cats[cat.key]}</div>`;
                cat.items.forEach(item => {
                    const isChecked = state.wheelPool.has(item.id) ? 'checked' : '';
                    html += `
                        <label class="toggle-row">
                            <span class="toggle-name">${item.icon} ${item[state.lang].n}</span>
                            <div class="switch">
                                <input type="checkbox" data-id="${item.id}" class="pool-toggle" ${isChecked}>
                                <span class="slider"></span>
                            </div>
                        </label>
                    `;
                });
                html += `</div>`;
                els.poolList.innerHTML += html;
            });

            document.querySelectorAll('.pool-toggle').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const id = e.target.dataset.id;
                    if(e.target.checked) state.wheelPool.add(id); else state.wheelPool.delete(id);
                    drawWheel();
                });
            });
        }

        function renderRolledTab() {
            els.rolledList.innerHTML = '';
            if(state.rolled.length === 0) {
                els.rolledList.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:12px; margin-top:20px;">Empty</div>`;
                return;
            }
            state.rolled.forEach((item, index) => {
                const el = document.createElement('div');
                el.className = 'selected-item';
                el.style.setProperty('--cat-color', item.catColor);
                
                const d = item[state.lang];
                el.innerHTML = `
                    <div class="selected-item-info">
                        <div class="selected-item-name">${item.icon} ${d.n}</div>
                        <div class="selected-item-desc">${d.d}</div>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <div class="selected-item-pct">${item.pct}%</div>
                        <button class="rolled-item-del" data-index="${index}">✖</button>
                    </div>
                `;
                els.rolledList.appendChild(el);
            });

            document.querySelectorAll('.rolled-item-del').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    state.rolled.splice(e.target.dataset.index, 1);
                    renderRolledTab();
                });
            });
        }

        let currentRotation = 0;
        
        function drawWheel() {
            const ctx = els.ctx;
            const cx = size/2, cy = size/2, r = size/2 - 15;
            ctx.clearRect(0, 0, size, size);
            
            const poolArr = Array.from(state.wheelPool).map(id => state.flatMods.get(id));
            
            const bgColor = getComputedStyle(document.body).getPropertyValue('--bg-color').trim() || '#000';
            
            if(poolArr.length === 0) {
                ctx.fillStyle = bgColor; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
                els.spinBtn.disabled = true; return;
            }
            els.spinBtn.disabled = false;
            
            const slice = (2 * Math.PI) / poolArr.length;
            const dropChance = (100 / poolArr.length).toFixed(2);
            
            for(let i=0; i<poolArr.length; i++) {
                const mod = poolArr[i];
                const start = i*slice;
                const end = start + slice;

                ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, start, end);
                ctx.fillStyle = mod.catHex; ctx.fill();
                ctx.lineWidth = 4; ctx.strokeStyle = bgColor; ctx.stroke();

                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(start + slice/2);
                ctx.textAlign = "right"; ctx.textBaseline = "middle";
                ctx.fillStyle = "#ffffff"; 
                ctx.font = "bold 20px Montserrat";
                ctx.shadowColor = "rgba(0,0,0,0.8)"; ctx.shadowBlur = 5;
                
                let text = `${mod[state.lang].n} (${dropChance}%)`;
                ctx.fillText(text, r - 40, 0, r - 90);
                ctx.restore();
            }
        }

        els.spinBtn.addEventListener('click', () => {
            if (state.wheelPool.size === 0) return;
            els.spinBtn.disabled = true;
            
            const timeInput = parseFloat(els.timeInput.value);
            const spinSeconds = (isNaN(timeInput) || timeInput < 1 ? 5 : timeInput);
            
            const extraSpins = Math.floor(Math.random() * 5) + 5;
            const randomDegrees = Math.floor(Math.random() * 360);
            
            currentRotation += (extraSpins * 360) + randomDegrees;
            
            els.wheelInner.style.transition = `transform ${spinSeconds}s cubic-bezier(0.1, 0.9, 0.2, 1)`;
            els.wheelInner.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                finishSpin();
            }, spinSeconds * 1000);
        });

        function finishSpin() {
            els.spinBtn.disabled = false;
            const poolArr = Array.from(state.wheelPool).map(id => state.flatMods.get(id));
            const sliceDegrees = 360 / poolArr.length;
            
            const normalizedRotation = currentRotation % 360;
            let winAngle = (360 - normalizedRotation) % 360;
            let winIndex = Math.floor(winAngle / sliceDegrees);
            
            state.currentWinner = poolArr[winIndex];
            showModal();
        }

        function showModal() {
            const mod = state.currentWinner;
            const t = i18n[state.lang];
            const dropChance = (100 / state.wheelPool.size).toFixed(2);
            
            document.getElementById('res-icon').textContent = mod.icon;
            document.getElementById('res-name').textContent = mod[state.lang].n;
            document.getElementById('res-chance').textContent = `${t.chance} ${dropChance}%`;
            
            document.getElementById('res-cat').textContent = t.cats[mod.catKey];
            document.getElementById('res-cat').style.color = mod.catHex;
            document.getElementById('res-desc').textContent = mod[state.lang].d;
            
            els.modal.style.setProperty('--modal-color', mod.catHex);
            document.getElementById('result-modal').classList.add('show');
        }

        function closeModal() { document.getElementById('result-modal').classList.remove('show'); }

        document.getElementById('btn-action-add').addEventListener('click', () => {
            state.rolled.push(state.currentWinner);
            
            state.wheelPool.delete(state.currentWinner.id);

            if (state.currentWinner.group) {
                for (let id of state.wheelPool) {
                    const mod = state.flatMods.get(id);
                    if (mod && mod.group === state.currentWinner.group) {
                        state.wheelPool.delete(id);
                    }
                }
            }

            renderRolledTab();
            renderPoolTab();
            drawWheel();
            closeModal();
        });

        document.getElementById('btn-spin-again').addEventListener('click', () => {
            closeModal();
            setTimeout(() => els.spinBtn.click(), 300);
        });

        updateAllUI();

    </script>
</body>
</html>
